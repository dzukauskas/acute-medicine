name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check engineering ledger checkpoint
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_REF="$PR_BASE_SHA"
          else
            BASE_REF="$PUSH_BEFORE_SHA"
            if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
              echo "Skipping engineering ledger checkpoint gate: push event has no usable before SHA."
              exit 0
            fi
          fi
          python scripts/check_engineering_ledger_checkpoint.py --base-ref "$BASE_REF" --head-ref "$HEAD_SHA"

      - name: Run focused unittest suite
        run: |
          python -m unittest $(python scripts/list_required_python_test_modules.py)
