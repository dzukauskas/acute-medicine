  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Hemodinamikos ir monitoravimo kontekstas.
  section_scope: '002'
localization_overrides:
- source_term: ACVPU
  local_lt: AVPU, o detalesniam neurologiniam vertinimui – GKS
  scope: '002'
  reason: JK `ACVPU` turi papildomą `new confusion` logiką, kuri Lietuvoje nėra standartinis greitas įvertinimas.
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Paaiškinti kaip JK kontekstą, bet ne perkelti kaip numatytą Lietuvos praktiką.
- source_term: NEWS2
  local_lt: pateikti kaip JK mokomąjį kontekstą, ne kaip Lietuvos nacionalinį standartą
  scope: '002'
  reason: '`NEWS2` originale svarbus, bet Lietuvoje jo slenksčiai nėra universalus nacionalinis standartas.'
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Leisti trumpą callout arba atskirą pastabą.
- source_term: ICU
  local_lt: intensyviosios terapijos skyrius
  scope: '002'
  reason: Pagrindiniame LT tekste pirmenybė teikiama lietuviškai formai.
  source_ref: books/acute-medicine/acronyms.tsv
  notes: Anglišką trumpinį palikti tik jei kontekstas tarptautinis ar bibliografinis.
style_hotspots:
- category: language_risk
  text: critical illness, organ perfusion, low cardiac output, fluid challenge lengvai virsta kalkėmis,
    jei neperrašomi į natūralią LT medicininę prozą.
- category: language_risk
  text: Šoko ir hemodinamikos sakiniai turi daug sąlyginių išlygų, todėl juos reikia skaidyti į trumpesnius,
    aiškesnius sakinius.
- category: language_risk
  text: Didelės lentelės gali tapti neįskaitomos, jei bus verčiamos pažodžiui; pirmenybė teikiama aiškiai
    markdown formai.
- category: anti_calque
  text: critically ill patient verčiamas kaip kritiškai sunkus pacientas, ne pažodine konstrukcija su
    kritiškai sergantis.
- category: anti_calque
  text: Vengti vardinių konstrukcijų kaip atlikti įvertinimą, vykdyti stebėjimą, atlikti korekciją; vietoj
    jų vartoti veiksmažodžius.
- category: anti_calque
  text: Biurokratines procedūrines formuluotes perrašyti į tiesioginius klinikinius nurodymus.
- category: localization_decision
  text: Skyrius rašomas nuo nulio pagal PDF puslapius 28–39, ne pagal ankstesnius study/ medžio failus.
- category: localization_decision
  text: Originalo ACVPU adaptuotas į Lietuvos kontekstui labiau tinkamą AVPU, o detalesniam neurologiniam
    įvertinimui nurodomas GKS.
- category: localization_decision
  text: NEWS2 paliekama kaip mokomasis originalo kontekstas, bet ne kaip numatytoji Lietuvos reagavimo
    sistema.
- category: localization_decision
  text: Pagrindinės fiziologinės ribos, hipoglikemijos korekcijos ir šoko algoritmų logika verčiama kaip
    studijų konspektas; vietose, kur originalas aiškiai remiasi JK sistema, paliekamas paaiškinantis callout.
- category: local_practice_change
  text: ACVPU perrašyta į AVPU / GKS logiką.
- category: local_practice_change
  text: NEWS2 slenksčiai pateikiami kaip JK RCP sistema, o ne Lietuvos nacionalinis standartas.
- category: local_practice_change
  text: Abejotinos ar iš OCR iškraipytos nuorodos į kitus skyrius tikslinamos pagal aktyvų šios knygos
    indeksą.
gold_examples:
- category: calque
  bad_en_shaped_lt: pradinis valdymas
  preferred_lt: pradiniai veiksmai
  notes: Antraštėse ir santraukose rinktis konkretesnę LT formą.
  source_chapter: '001'
- category: calque
  bad_en_shaped_lt: sprendimas dėl gaivinimo turi būti priimamas
  preferred_lt: šį klausimą reikia aptarti iš anksto
  notes: Teisiniuose ir klinikiniuose sakiniuose vengti pasyvaus administracinio karkaso.
  source_chapter: '001'
- category: calque
  bad_en_shaped_lt: eskaluoti pagalbą
  preferred_lt: kviesti papildomą pagalbą
  notes: Konkretus veiksmas aiškesnis už vadybinę kalkę.
  source_chapter: '001'
- category: collocation
  bad_en_shaped_lt: kompresijų kokybė
  preferred_lt: kokybiški krūtinės ląstos paspaudimai
  notes: Jei įmanoma, konkretinti abstraktų terminą.
  source_chapter: '001'
- category: collocation
  bad_en_shaped_lt: pažangūs kvėpavimo takai
  preferred_lt: supraglotinis prietaisas arba endotrachėjinis vamzdelis
  notes: Jei reikia, įvardyti realią priemonę, ne abstrakciją.
  source_chapter: '001'
- category: syntax
  bad_en_shaped_lt: prioritetas yra kuo greitesnis defibriliatoriaus prijungimas
  preferred_lt: kuo greičiau prijunkite defibriliatorių
  notes: Verstinį prioritetų karkasą keisti tiesioginiu nurodymu.
  source_chapter: '001'
- category: calque
  bad_en_shaped_lt: galvokite apie sepsį
  preferred_lt: įtarkite sepsį
  notes: Klinikinėje lietuvių kalboje „įtarkite“ skamba natūraliau.
  source_chapter: '002'
- category: calque
  bad_en_shaped_lt: tolesni veiksmai priklauso nuo vyraujančios problemos
  preferred_lt: toliau veikite pagal vyraujančią problemą
  notes: Trumpesnė ir aktyvesnė formuluotė.
  source_chapter: '002'
- category: nominalization
  bad_en_shaped_lt: pirminio gydymo tikslas yra
  preferred_lt: pirminio gydymo tikslas –
  notes: Apibrėžimuose ir principų blokuose vengti perteklinio „yra“.
  source_chapter: '002'
- category: calque
  bad_en_shaped_lt: reikia svarstyti endotrachėjinę intubaciją
  preferred_lt: apsvarstykite endotrachėjinę intubaciją
  notes: Veiksmų sekoje rinktis tiesioginę aktyvią formą.
  source_chapter: '002'
- category: collocation
  bad_en_shaped_lt: normalus spaudimas nereiškia pakankamo organų aprūpinimo krauju
  preferred_lt: normalus spaudimas dar negarantuoja pakankamos organų perfuzijos
  notes: Hemodinaminėje prozoje išlaikyti LT medicininę kolokaciją.
  source_chapter: '002'
- category: syntax
  bad_en_shaped_lt: kardiogeninis šokas yra viena dažniausių ... ir pasižymi
  preferred_lt: kardiogeninis šokas dažnai ... ir jį lydi
  notes: Apibrėžimus trumpinti iki natūralaus LT ritmo.
  source_chapter: '002'
