active_acronyms:
- acronym: VT
  lt: skilvelinė tachikardija
  en: ventricular tachycardia
  policy: vengti be būtinybės
  notes: Jei reikia tikslumo, išskleisti pilną LT formą.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: Gali būti supainiotas su VF ar pVT.
  preferred_lt_context: Aritmijų ir defibriliuotino ritmo kontekstas.
  section_scope: '002'
- acronym: EKG
  lt: elektrokardiograma
  en: electrocardiogram
  policy: galima vartoti
  notes: Nusistovėjęs trumpinys LT medicinoje.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Monitoravimo ir diagnostikos kontekstas.
  section_scope: '002'
- acronym: SpO2
  lt: deguonies įsotinimas
  en: pulse oximetry saturation
  policy: pirmą kartą paaiškinti
  notes: Trumpinys gali likti po pirmo aiškaus konteksto.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: Gali būti vartojamas be paaiškinimo, jei pastraipa labai tanki.
  preferred_lt_context: Deguonies saturacijos kontekstas.
  section_scope: '002'
- acronym: ABCDE
  lt: ABCDE įvertinimas
  en: airway breathing circulation disability exposure
  policy: galima vartoti
  notes: Jei auditorijai gali būti neaišku, vieną kartą paaiškinti, ką reiškia santrumpa.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Struktūruoto paciento vertinimo kontekstas.
  section_scope: '002'
- acronym: GMP
  lt: greitoji medicinos pagalba
  en: emergency medical services
  policy: galima vartoti
  notes: Lietuvos kontekste nusistovėjęs trumpinys.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Lietuvos sistemos ir organizacinio reagavimo kontekstas.
  section_scope: '002'
- acronym: SAM
  lt: Sveikatos apsaugos ministerija
  en: Ministry of Health
  policy: galima vartoti
  notes: Lietuvos teisės aktų ir metodikų kontekstas.
  must_expand_first: 'no'
  allowed_in_headings: 'no'
  ambiguous_context: ''
  preferred_lt_context: Teisės aktų ir metodikų kontekstas.
  section_scope: '002'
- acronym: AVPU
  lt: budrus / reaguoja į balsą / reaguoja į skausmą / nereaguoja
  en: alert / voice / pain / unresponsive
  policy: galima vartoti
  notes: Lietuvos praktikoje tinkama greitam sąmonės įvertinimui.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: Gali būti painiojama su JK ACVPU.
  preferred_lt_context: Sąmonės įvertinimo kontekstas.
  section_scope: '002'
- acronym: GKS
  lt: Glazgo komos skalė
  en: Glasgow Coma Scale
  policy: galima vartoti
  notes: Detalesniam neurologiniam įvertinimui.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Neurologinio įvertinimo kontekstas.
  section_scope: '002'
- acronym: NEWS2
  lt: nacionalinis ankstyvojo perspėjimo balas 2
  en: National Early Warning Score 2
  policy: riboti
  notes: JK mokomasis kontekstas; ne Lietuvos nacionalinis standartas.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: JK sistemos trumpinys; neturi būti pateikiamas kaip Lietuvos standartas.
  preferred_lt_context: Originalo JK konteksto paaiškinimas.
  section_scope: '002'
- acronym: MAP
  lt: vidutinis arterinis spaudimas
  en: mean arterial pressure
  policy: galima vartoti
  notes: Pirmą kartą paaiškinti.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Hemodinamikos kontekstas.
  section_scope: '002'
- acronym: JVP
  lt: jungo veninis spaudimas
  en: jugular venous pressure
  policy: galima vartoti
  notes: Pirmą kartą paaiškinti.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Hemodinaminio vertinimo kontekstas.
  section_scope: '002'
- acronym: ICU
  lt: intensyviosios terapijos skyrius
