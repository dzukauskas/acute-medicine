localization_overrides:
- source_term: ACVPU
  local_lt: AVPU, o detalesniam neurologiniam vertinimui – Glazgo komos skalė (GKS)
  scope: '002'
  reason: JK `ACVPU` turi papildomą `new confusion` logiką, kuri Lietuvoje nėra standartinis greitas įvertinimas.
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Paaiškinti kaip JK kontekstą, bet ne perkelti kaip numatytą Lietuvos praktiką.
- source_term: NEWS2
  local_lt: pateikti kaip JK mokomąjį kontekstą, ne kaip universalų Lietuvos standartą
  scope: '002'
  reason: '`NEWS2` originale svarbus; Lietuvoje jis minimas tik kai kuriuose specifiniuose protokoluose,
    bet nėra universalus nacionalinis standartas visoms kritinėms būklėms.'
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Leisti trumpą callout arba atskirą pastabą.
- source_term: ICU
  local_lt: intensyviosios terapijos skyrius
  scope: '002'
  reason: Pagrindiniame LT tekste pirmenybė teikiama lietuviškai formai.
  source_ref: books/acute-medicine/acronyms.tsv
  notes: Anglišką trumpinį palikti tik jei kontekstas tarptautinis ar bibliografinis.
style_hotspots:
- category: language_risk
  text: Hemodinaminė proza apie perfuziją, JVP, vazodilataciją ir hipovolemiją lengvai nuslysta į EN karkasą.
- category: language_risk
  text: current problem, context and co-morbidities linkęs virsti gremėzdišku pažodiniu sakiniu.
- category: language_risk
  text: dominant clinical problem or working diagnosis reikalauja aiškaus LT veiksmo, ne abstrakčios nominalizacijos.
- category: language_risk
  text: Lentelėse 2.4 ir 2.5 didžiausia kolokacinė rizika yra šoko kategorijų ir hipotenzijos priežasčių
    pavadinimai.
- category: language_risk
  text: Skiltis apie inotropus ir vazopresorius turi likti techniškai tiksli, bet ne mechaniškai pažodinė.
- category: anti_calque
  text: Vengti galvokite apie sepsį; rinktis įtarkite sepsį.
- category: anti_calque
  text: Vengti tolesni veiksmai priklauso; rinktis toliau veikite / gydykite pagal....
- category: anti_calque
  text: Vengti reikia svarstyti endotrachėjinę intubaciją; rinktis apsvarstykite endotrachėjinę intubaciją.
- category: anti_calque
  text: Vengti siurblio nepakankamumo; rinktis kliniškai nusistovėjusias kategorijas kardiogeninė ar obstrukcinė
    priežastis.
- category: anti_calque
  text: Vengti ilgo NHS organizacinio žargono; LT tekste svarbus klinikinis sprendimas, o ne britiško
    vaidmens pavadinimo kalkė.
- category: localization_decision
  text: Skyriaus pavadinimui pasirenkama forma Kritinės būklės pacientas, o ne kritiškai sunkus pacientas,
    nes būtent taip kritines būkles apibrėžia SAM metodinė vartosena.
- category: localization_decision
  text: ACVPU neperkeliama kaip numatytoji LT praktikos santrumpa; greitam sąmonės įvertinimui naudojama
    AVPU, o detalesniam neurologiniam vertinimui Glazgo komos skalė (GKS).
- category: localization_decision
  text: NEWS2 paliekamas kaip JK mokomasis kontekstas; LT tekste jis neįvardijamas kaip universalus nacionalinis
    standartas.
- category: localization_decision
  text: Cardiac obstruction or pump failure ir Cardiac pump failure verčiami per kliniškai nusistovėjusias
    kategorijas obstrukcinė ir kardiogeninė priežastis, o ne per pažodinį siurblio nepakankamumą.
- category: localization_decision
  text: organ perfusion paliekama organų perfuzija, ne organų aprūpinimas krauju, kai kalbama apie hemodinamiką.
- category: localization_decision
  text: ICU verčiama intensyviosios terapijos skyrius.
- category: local_practice_change
  text: Trys NEWS2 chart'ai LT variante sutraukiami į vieną aiškų kontekstinį bloką su paaiškinimu, kad
    tai yra originalo JK balų sistema.
- category: local_practice_change
  text: ACVPU pakeičiama LT praktikai artimesniu AVPU ir GKS paaiškinimu.
- category: local_practice_change
  text: Originalo specialist registrar level ir panašūs NHS eskalavimo terminai neperkeliami pažodžiui;
    paliekama bendresnė nuoroda į skubų vyresnio gydytojo / kritinių būklių komandos įvertinimą pagal
    vietinę tvarką.
