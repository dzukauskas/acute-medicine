- kind: section
  example_id: gs-002-news2-callout
  source_chapter: '002'
  block_id: callout-1-news2-scoring-system
  block_type: chart
  tags:
  - uk-localization
  - monitoring
  - chart-summary
  text: '## `NEWS2` originalo kontekste


    - `NEWS2` vertina kvėpavimo dažnį, deguonies saturaciją, deguonies skyrimą, sistolinį kraujospūdį,
    pulsą, sąmonės būklę ir temperatūrą.

    - Vienas ryškiai pakitęs rodiklis jau laikomas priežastimi skubiai peržiūrėti pacientą.


    > [!WARNING]

    > `NEWS2` ir `ACVPU` yra JK `RCP` sistemos dalis. Lietuvos dokumentuose dažniau rasite `AVPU` ir `GKS`.'
  notes: JK NEWS2 chart'ų sutraukto LT paaiškinimo pavyzdys.
  path: gold_sections/002-news2-callout.md
- kind: section
  example_id: gs-002-shock-algorithm
  source_chapter: '002'
  block_id: algorithm-2.2-management-of-hypotension-and-shock
  block_type: algorithm
  tags:
  - algorithmic
  - hemodynamic
  - stepwise
  text: '1. Jei sistolinis spaudimas `<90 mmHg`, `MAP <65 mmHg` arba sistolinis spaudimas krito `>40 mmHg`
    ir yra organų disfunkcijos požymių, vertinkite pacientą kaip ištiktą šoko.

    2. Vertinkite pagal `ABCDE`.

    3. Prijunkite deguonį, `EKG`, veninę prieigą.

    4. Stabilizuokite kvėpavimo takus ir kvėpavimą.

    5. Nustačius priežastį, gydykite ją tikslingai ir, jei reikia, pradėkite inotropų ar vazopresorių
    terapiją.'
  notes: Glausta hipotenzijos ir šoko veiksmų seka.
  path: gold_sections/002-shock-algorithm.md
- kind: section
  example_id: gs-002-shock-prose
  source_chapter: '002'
  block_id: narrative-08-shock
  block_type: narrative
  tags:
  - hemodynamic
  - complex-prose
  text: 'Šokas reiškia ūminį kraujotakos nepakankamumą, kai ląstelės negali tinkamai panaudoti deguonies,
    todėl vystosi organų funkcijos sutrikimas ir laktatinė acidozė.


    Kompensaciniai mechanizmai pradžioje gali išlaikyti kraujospūdį, todėl „normalus“ arterinis spaudimas
    dar nereiškia, kad organų perfuzija pakankama.'
  notes: Trumpas hemodinaminės prozos pavyzdys su natūraliu LT ritmu.
  path: gold_sections/002-shock-prose.md
- kind: section
