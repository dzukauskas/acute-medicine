localization_overrides:
- source_term: ACVPU
  local_lt: AVPU, o detalesniam neurologiniam vertinimui – GKS
  scope: '002'
  reason: JK `ACVPU` turi papildomą `new confusion` logiką, kuri Lietuvoje nėra standartinis greitas įvertinimas.
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Paaiškinti kaip JK kontekstą, bet ne perkelti kaip numatytą Lietuvos praktiką.
- source_term: NEWS2
  local_lt: pateikti kaip JK mokomąjį kontekstą, ne kaip Lietuvos nacionalinį standartą
  scope: '002'
  reason: '`NEWS2` originale svarbus, bet Lietuvoje jo slenksčiai nėra universalus nacionalinis standartas.'
  source_ref: books/acute-medicine/research/002-the-critically-ill-patient.md
  notes: Leisti trumpą callout arba atskirą pastabą.
- source_term: ICU
  local_lt: intensyviosios terapijos skyrius
  scope: '002'
  reason: Pagrindiniame LT tekste pirmenybė teikiama lietuviškai formai.
  source_ref: books/acute-medicine/acronyms.tsv
  notes: Anglišką trumpinį palikti tik jei kontekstas tarptautinis ar bibliografinis.
style_hotspots:
- category: language_risk
  text: critical illness, organ perfusion, low cardiac output, fluid challenge lengvai virsta kalkėmis,
    jei neperrašomi į natūralią LT medicininę prozą.
- category: language_risk
  text: Šoko ir hemodinamikos sakiniai turi daug sąlyginių išlygų, todėl juos reikia skaidyti į trumpesnius,
    aiškesnius sakinius.
- category: language_risk
  text: Didelės lentelės gali tapti neįskaitomos, jei bus verčiamos pažodžiui; pirmenybė teikiama aiškiai
    markdown formai.
- category: anti_calque
  text: critically ill patient verčiamas kaip kritiškai sunkus pacientas, ne pažodine konstrukcija su
    kritiškai sergantis.
- category: anti_calque
  text: Vengti vardinių konstrukcijų kaip atlikti įvertinimą, vykdyti stebėjimą, atlikti korekciją; vietoj
    jų vartoti veiksmažodžius.
- category: anti_calque
  text: Biurokratines procedūrines formuluotes perrašyti į tiesioginius klinikinius nurodymus.
- category: localization_decision
  text: Skyrius rašomas nuo nulio pagal PDF puslapius 28–39, ne pagal ankstesnius study/ medžio failus.
- category: localization_decision
  text: Originalo ACVPU adaptuotas į Lietuvos kontekstui labiau tinkamą AVPU, o detalesniam neurologiniam
    įvertinimui nurodomas GKS.
- category: localization_decision
  text: NEWS2 paliekama kaip mokomasis originalo kontekstas, bet ne kaip numatytoji Lietuvos reagavimo
    sistema.
- category: localization_decision
  text: Pagrindinės fiziologinės ribos, hipoglikemijos korekcijos ir šoko algoritmų logika verčiama kaip
    studijų konspektas; vietose, kur originalas aiškiai remiasi JK sistema, paliekamas paaiškinantis callout.
- category: local_practice_change
  text: ACVPU perrašyta į AVPU / GKS logiką.
- category: local_practice_change
  text: NEWS2 slenksčiai pateikiami kaip JK RCP sistema, o ne Lietuvos nacionalinis standartas.
- category: local_practice_change
  text: Abejotinos ar iš OCR iškraipytos nuorodos į kitus skyrius tikslinamos pagal aktyvų šios knygos
    indeksą.
