- category: calque
  bad_en_shaped_lt: galvokite apie sepsį
  preferred_lt: įtarkite sepsį
  notes: Klinikinėje lietuvių kalboje „įtarkite“ skamba natūraliau.
  source_chapter: '002'
- category: calque
  bad_en_shaped_lt: tolesni veiksmai priklauso nuo vyraujančios problemos
  preferred_lt: toliau veikite pagal vyraujančią problemą
  notes: Trumpesnė ir aktyvesnė formuluotė.
  source_chapter: '002'
- category: nominalization
  bad_en_shaped_lt: pirminio gydymo tikslas yra
  preferred_lt: pirminio gydymo tikslas –
  notes: Apibrėžimuose ir principų blokuose vengti perteklinio „yra“.
  source_chapter: '002'
- category: calque
  bad_en_shaped_lt: reikia svarstyti endotrachėjinę intubaciją
  preferred_lt: apsvarstykite endotrachėjinę intubaciją
  notes: Veiksmų sekoje rinktis tiesioginę aktyvią formą.
  source_chapter: '002'
- category: collocation
  bad_en_shaped_lt: normalus spaudimas nereiškia pakankamo organų aprūpinimo krauju
  preferred_lt: normalus spaudimas dar negarantuoja pakankamos organų perfuzijos
  notes: Hemodinaminėje prozoje išlaikyti LT medicininę kolokaciją.
  source_chapter: '002'
- category: syntax
  bad_en_shaped_lt: kardiogeninis šokas yra viena dažniausių ... ir pasižymi
  preferred_lt: kardiogeninis šokas dažnai ... ir jį lydi
  notes: Apibrėžimus trumpinti iki natūralaus LT ritmo.
  source_chapter: '002'
