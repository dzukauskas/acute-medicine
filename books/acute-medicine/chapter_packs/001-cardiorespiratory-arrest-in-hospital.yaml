  text: 'Šokas reiškia ūminį kraujotakos nepakankamumą, kai ląstelės negali tinkamai panaudoti deguonies,
    todėl vystosi organų funkcijos sutrikimas ir laktatinė acidozė.


    Kompensaciniai mechanizmai pradžioje gali išlaikyti kraujospūdį, todėl „normalus“ arterinis spaudimas
