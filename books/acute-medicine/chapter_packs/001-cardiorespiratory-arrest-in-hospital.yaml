- kind: section
  example_id: gs-001-als-algorithm
  source_chapter: '001'
  block_id: algorithm-1.1-algorithm-for-adult-advanced-life-support
  block_type: algorithm
  tags:
  - algorithmic
  - resuscitation
  - stepwise
  text: '1. Jei pacientas nereaguoja ir nekvėpuoja normaliai, kvieskite pagalbą ir pradėkite gaivinimą.

    2. Atlikite gaivinimą santykiu `30 : 2` ir prijunkite defibriliatorių ar monitorių.

    3. Įvertinkite ritmą.

    4. Jei ritmas defibriliuotinas, atlikite vieną iškrovą ir iš karto tęskite gaivinimą 2 min.

    5. Jei ritmas nedefibriliuotinas, iš karto tęskite gaivinimą 2 min. ir kuo anksčiau skirkite adrenalino.'
  notes: Trumpa komandinio algoritmo santrauka su aktyviais veiksmažodžiais.
  path: gold_sections/001-als-algorithm.md
