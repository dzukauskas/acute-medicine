  source_chapter: '001'
- category: calque
  bad_en_shaped_lt: sprendimas dėl gaivinimo turi būti priimamas
  preferred_lt: šį klausimą reikia aptarti iš anksto
  notes: Teisiniuose ir klinikiniuose sakiniuose vengti pasyvaus administracinio karkaso.
