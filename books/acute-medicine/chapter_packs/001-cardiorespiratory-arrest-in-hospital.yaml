style_hotspots:
- category: language_risk
  text: Tiesioginiai ALS tipo terminų vertiniai, ypač advanced life support, linkę skambėti kaip kalkės,
    jei neperrašomi pagal Lietuvos gaivinimo vartoseną.
- category: language_risk
  text: Pasyvios konstrukcijos su sprendimas dėl ... turi būti ... lengvai persikelia iš originalo ir
    reikalauja atskiro perrašymo.
- category: language_risk
  text: Originalo ritmų, adrenalino ir po ROSC sakiniai turi daug sąlyginių išlygų, todėl lietuviškai
    juos reikia skaidyti į trumpesnius sakinius.
- category: language_risk
  text: Gaivinimo algoritmo veiksmų aprašas turi būti aktyvus ir komandiškas, o ne vardinis ar biurokratinis.
- category: anti_calque
  text: advanced life support suvienodintas į specialusis gaivinimas, ne paliekant tiesioginį pažodinį
    vertinį.
- category: anti_calque
  text: Pakeistos pasyvios biurokratinės formos, pvz. sprendimas dėl ... turi būti priimamas, į aktyvesnes
    lietuviškas konstrukcijas.
- category: anti_calque
  text: Pašalintos angliško karkaso frazės, pvz. prioritetas yra, eskaluoti pagalbą, naudingas kaip bendras
    kontekstas.
- category: anti_calque
  text: Ilgi, logiškai apkrauti sakiniai apie adrenaliną, po ROSC priežiūrą ir CPR ribas suskaidyti į
    trumpesnes, natūralesnes lietuviškas formuluotes.
- category: localization_decision
  text: Skyrius bus rašomas nuo nulio remiantis PDF, ne ankstesniu ištrauktu markdown failu.
- category: localization_decision
  text: JK vidaus instrukcijos, pvz. 2222, negali likti kaip universalus Lietuvos standartas.
- category: localization_decision
  text: Vienetai ir klinikinė rašysena turi būti Lietuvos / ES / SI formatu.
- category: localization_decision
  text: Pagrindiniame tekste prioritetas teikiamas Lietuvos teisinei ir klinikinei logikai, o RCUK / NCAA
    / ReSPECT paliekami tik kaip originalo kontekstas.
- category: localization_decision
  text: Ten, kur Lietuvos šaltiniuose trumpinių vartojimas nevienodas, pagrindiniame tekste bus teikiama
    pirmenybė pilnam lietuviškam terminui, o ne trumpiniui.
- category: localization_decision
  text: Po ROSC dalis bus sulyginta ne tik su knygos 2021 logika, bet ir su ERC 2025 post-resuscitation
    care nuostatomis.
- category: local_practice_change
  text: Vidinis kritinės pagalbos iškvietimas bus rašomas kaip vietinės ligoninės reagavimo sistemos veiksmas,
    ne kaip universali nuoroda skambinti 2222.
- category: local_practice_change
  text: ReSPECT / DNACPR dalis bus perrašyta pagal Lietuvos paciento nesutikimo, kad būtų gaivinamas ir
    beviltiško gaivinimo reglamentavimą.
- category: local_practice_change
  text: Po ROSC temperatūros ir hemodinamikos dalis bus tikslinama pagal ERC/ESICM 2025.
- category: local_practice_change
  text: Automatinio išorinio defibriliatoriaus trumpinio nevienodumo Lietuvoje problema sprendžiama pagrindiniame
    tekste vartojant pilną termino formą, o ne vieną ginčytiną trumpinį.
