active_acronyms:
- acronym: CPR
  lt: kardiopulmoninis gaivinimas
  en: cardiopulmonary resuscitation
  policy: pirmą kartą išskleisti
  notes: Po pirmos pilnos formos galima vartoti CPR.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
