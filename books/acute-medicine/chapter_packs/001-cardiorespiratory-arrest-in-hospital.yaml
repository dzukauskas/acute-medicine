  policy: galima vartoti
  notes: Jei auditorijai gali būti neaišku, vieną kartą paaiškinti, ką reiškia santrumpa.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Struktūruoto paciento vertinimo kontekstas.
  section_scope: '001'
- acronym: GMP
  lt: greitoji medicinos pagalba
  en: emergency medical services
  policy: galima vartoti
  notes: Lietuvos kontekste nusistovėjęs trumpinys.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Lietuvos sistemos ir organizacinio reagavimo kontekstas.
  section_scope: '001'
localization_overrides:
- source_term: '2222'
  local_lt: Naudokite savo įstaigos vidaus kritinės pagalbos arba gaivinimo komandos iškvietimo tvarką.
  scope: '001'
  reason: JK vidaus telefono numeris negali būti pateiktas kaip universalus Lietuvos standartas.
  source_ref: books/acute-medicine/research/001-cardiorespiratory-arrest-in-hospital.md
  notes: Santaros klinikose 2222 taikomas, bet tai nėra nacionalinis standartas visoms įstaigoms.
- source_term: ReSPECT
  local_lt: vadovautis Lietuvos teisės aktais, įstaigos vidaus tvarka ir dokumentuotu konsiliumo sprendimu
  scope: '001'
  reason: JK `ReSPECT` forma neturi tiesioginio Lietuvos atitikmens.
  source_ref: books/acute-medicine/research/001-cardiorespiratory-arrest-in-hospital.md
  notes: Pagrindiniame tekste neperkelti kaip naudojamos formos.
- source_term: DNACPR
  local_lt: vadovautis paciento nesutikimu būti gaivinamam ir beviltiško gaivinimo reglamentavimu
  scope: '001'
  reason: JK `DNACPR` negali būti pateiktas kaip Lietuvos procedūra.
  source_ref: books/acute-medicine/research/001-cardiorespiratory-arrest-in-hospital.md
  notes: Palikti tik originalo kontekstui ar lyginamajai pastabai.
- source_term: advanced life support
  local_lt: specialusis gaivinimas
  scope: '001'
  reason: Lietuvos gaivinimo vartosenoje ši forma natūralesnė už pažodinį vertinį.
  source_ref: books/acute-medicine/research/001-cardiorespiratory-arrest-in-hospital.md
  notes: Naudoti ir tekstuose, ir figūrose.
style_hotspots:
- category: language_risk
  text: The initial response ensuring early chest compressions... lengvai nuslysta į gremėzdišką vertinį.
- category: language_risk
  text: The appropriateness of a resuscitation attempt should be considered... linkęs virsti administraciniu
    pasyvu.
- category: language_risk
  text: The team leader will hand control... reikalauja natūralaus komandinio LT ritmo.
- category: language_risk
  text: prolonged resuscitation attempt ir decisions regarding cardiopulmonary resuscitation lengvai virsta
    biurokratine kalba.
- category: language_risk
  text: Pastraipa po ROSC turi likti kliniškai aiški ir neperkrauta technine nuosaka.
- category: anti_calque
  text: Vengti eskaluoti pagalbą; rinktis kviesti papildomą pagalbą.
- category: anti_calque
  text: Vengti prioritetas yra; algoritmo ir veiksmų bloke rašyti tiesioginį nurodymą.
- category: anti_calque
  text: Vengti sprendimas dėl gaivinimo turi būti priimamas; rinktis aiškią aktyvią formą apie išankstinį
    aptarimą.
- category: anti_calque
  text: Vengti perteklinio EN ritmų veidrodinio kartojimo; pirmą kartą išskleisti LT forma, toliau trumpinti
    tik kur tai padeda skaitomumui.
- category: localization_decision
  text: Skyriaus pavadinimui pirmenybė teikiama formai Širdies sustojimas ligoninėje, nes skyrius praktiškai
    aprašo in-hospital cardiac arrest; bendresnė forma kardiorespiracinis sustojimas paliekama tik ten,
    kur iš tiesų kalbama apie kvėpavimo ir kraujotakos išnykimą kartu.
- category: localization_decision
  text: advanced life support verčiamas specialusis gaivinimas, ne pažangusis gyvybės palaikymas.
- category: localization_decision
  text: Chest compressions versti krūtinės ląstos paspaudimai, ne širdies masažas.
- category: localization_decision
  text: Agonal breathing versti agoninis kvėpavimas; tekste tai turi būti aiškiai įvardyta kaip širdies
    sustojimo požymis.
- category: localization_decision
  text: ReSPECT ir DNACPR paliekami tik kaip JK konteksto pavadinimai; Lietuvos tekste jie neperkelti
    kaip vietiniai dokumentai ar procedūros.
- category: localization_decision
  text: 2222 nekeičiamas į tariamą universalų LT standartą; vietoje to nurodoma vadovautis įstaigos vidaus
    kritinės pagalbos arba gaivinimo komandos iškvietimo tvarka.
- category: local_practice_change
  text: JK vidaus numeris 2222 nepateikiamas kaip visoms Lietuvos įstaigoms galiojanti taisyklė.
- category: local_practice_change
  text: ReSPECT ir DNACPR skyriaus pabaigoje pakeičiami LT teisinio ir etinio konteksto paaiškinimu apie
    paciento valią, beviltišką gaivinimą ir dokumentuotą sprendimą.
- category: local_practice_change
  text: AED mode ir standalone AED paliekami kaip techniniai terminai, bet be JK organizacinių implikacijų.
