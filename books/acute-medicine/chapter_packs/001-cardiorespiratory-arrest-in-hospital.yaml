  policy: pirmą kartą išskleisti
  notes: Po pirmos pilnos formos galima vartoti ROSC.
  must_expand_first: 'yes'
  allowed_in_headings: 'yes'
  ambiguous_context: ''
  preferred_lt_context: Pogaiviniminės priežiūros kontekstas.
  section_scope: '001'
- acronym: VF
  lt: skilvelių virpėjimas
  en: ventricular fibrillation
  policy: vengti be būtinybės
  notes: Jei nėra vietos stokos, geriau pilna LT forma.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: Gali būti supainiotas su VT, jei ritmai pateikiami sutrumpintai.
  preferred_lt_context: Defibriliuotinų ritmų kontekstas.
  section_scope: '001'
- acronym: VT
  lt: skilvelinė tachikardija
  en: ventricular tachycardia
  policy: vengti be būtinybės
  notes: Jei reikia tikslumo, išskleisti pilną LT formą.
  must_expand_first: 'no'
  allowed_in_headings: 'yes'
  ambiguous_context: Gali būti supainiotas su VF ar pVT.
  preferred_lt_context: Aritmijų ir defibriliuotino ritmo kontekstas.
  section_scope: '001'
- acronym: ABCDE
