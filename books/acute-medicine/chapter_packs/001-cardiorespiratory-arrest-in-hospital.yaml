    atitikmens. Reikia vadovautis Lietuvos teisės aktais, įstaigos vidaus tvarka ir dokumentuotais konsiliumo
    sprendimais.'
  notes: JK dokumentų neprilyginimo LT tvarkai pavyzdys.
