- block_id: narrative-02-guideline-selection
  block_type: narrative
  heading: Guideline Selection
  source_anchor: Guideline Selection
  source_excerpt: 'Guideline Selection

    JRCALC, NASMeD (National Ambulance Service Medical Directors) and the ALPG (Ambulance Lead Paramedic
    Group) will advise on those clinical guidelines which need updating and those clinical conditions
    which need a new guideline developing. These are then prioritised and assessed with regard, to urgency
    and risk. Clinical topics can be identified through a variety of means including the monitoring of
    serious incidents within individual UK Ambulance Service Trusts, preventing future death reports issued
    by coroners and national service reconfigurations. In addition JRCALC provide extensive clinical expertise
    and advice on potential new developments to ensure that the guidelines capture latest best practice
    and future innovations and encourage further research into pre hospital care.

    Feedback is welcome via JRCALC@AACE.org

    Editorial Independence

    No external funding has been received for the development of these guidelines and no competing or
    conflicting interests have been declared by those involved in their development.

    Citing the JRCALC Guidelines

    The JRCALC Guidelines are cited as:

    Joint Royal Colleges Ambulance Liaison Committee, Association of Ambulance Chief Executives (2025)
    JRCALC Clinical Guidelines 2025. Bridgwater: Class Professional Publishing.'
