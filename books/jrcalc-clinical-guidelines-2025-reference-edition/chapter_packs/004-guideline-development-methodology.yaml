    Guideline Development Methodology

    The methodology used by JRCALC (Joint Royal Colleges Ambulance Liaison Committee) to develop the UK
    Ambulance Services Clinical Practice Guidelines is designed to comply with the criteria used by the
    AGREE II (Appraisal of Guidelines for Research and Evaluation in Europe) instrument. This process
    is a leading academic tool to identify good quality guidelines: http://www.agreetrust.org/

    The purpose of the AGREE II, is to provide a framework to:

    - assess the quality of guidelines

    - provide a methodological strategy for the development of guidelines'
