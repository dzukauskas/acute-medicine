  source_excerpt: '# Chapter 1 Disclaimer

    - Šaltinio segmentai: c76.xhtml

    - EPUB: JRCALC Clinical Guidelines 2025 Reference Edition.epub

    Disclaimer

    Using these Guidelines

    The Association of Ambulance Chief Executives and the Joint Royal Colleges Ambulance Liaison Committee
    have made every effort to ensure that the information, tables, drawings and diagrams contained in
    these guidelines are accurate at the time of publication. However, the guidelines are advisory and
    have been developed to assist healthcare professionals, and patients, to make decisions about the
    management of the patient’s health, including treatments. This advice is intended to support the decision
    making process and is not a substitute for sound clinical judgement. The guidelines cannot always
    contain all the information necessary for determining appropriate care and cannot address all individual
    situations; therefore, individuals using these guidelines must ensure they have the appropriate knowledge
    and skills to enable suitable interpretation.

    JRCALC has referenced NICE in these guidelines. NICE guidance is prepared for the National Health
    Service in England and is subject to regular review and may be updated or withdrawn. NICE has not
    checked the use of its content in these guidelines to confirm that it accurately reflects the NICE
    publications from which it is taken.

    Users of these guidelines must always be aware that alterations after the date of publication cannot
    be incorporated into the printed edition.'
