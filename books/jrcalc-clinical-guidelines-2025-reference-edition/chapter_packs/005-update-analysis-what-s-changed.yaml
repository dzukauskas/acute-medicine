- block_id: narrative-03-resuscitation
  block_type: narrative
  heading: Resuscitation
  source_anchor: Resuscitation
  source_excerpt: '| Resuscitation |  |  |

    | Guideline Title | Last Update | Notes |

    | Advanced Life Support | April 2025 | An amendment in section 10.3 to confirm that intra-osseous
    (IO) obtained blood may be used to check blood sugar. |

    | Basic Life Support in Adults | September 2022 | Reviewed and updated in line with RCUK. New wording
    added. |

    | Basic Life Support in Children | September 2022 | Reviewed and updated in line with RCUK. New wording
    added. |

    | Emergency Tracheostomy and Laryngectomy Pre-hospital Management | September 2022 | Reviewed in line
    with RCUK. Revised management algorithms. |

    | Foreign Body Airway Obstruction | September 2022 | Reviewed in line with RCUK. All reversible causes
    should be considered. |

    | Out-of-Hospital Cardiac Arrest: Overview | September 2022 | Reviewed and updated in line with RCUK.
    New wording added. |'
