- block_id: narrative-07-special-situations
  block_type: narrative
  heading: Special Situations
  source_anchor: Special Situations
  source_excerpt: '| Special Situations |  |  |

    | Guideline Title | Last Update | Notes |

    | Atropine for CBRNE | October 2022 | Reviewed and updated. |

    | Chemical Biological Radiological Nuclear (CBRN) Incidents Including Hazardous Materials | March
    2024 | Revised and updated by NARU. Revised CRESS tool. Step 123 removed and new: Recognise, Assess
    and React figure included. |

    | Major, Complex and High-Risk Incidents | January 2024 | Reviewed and updated by NARU. Includes the
    new major incident triage tool algorithm (MITT). Includes the Ten Second Triage (TST), a new primary
    scene triage tool that has been developed for use by all first responders to any incident with multiple
    casualties. |

    | Police Incapacitants | October 2022 | Reviewed and updated by NARU. Updated guidance on Conducted
    Energy Devices (Tasers). Updated assessment and management of irritant/incapacitant sprays, attenuating
    energy projectiles and batons. |'
