style_hotspots:
- category: language_risk
  text: reviewed and updated in line with... nepalikti kaip pasikartojančios pažodinės kalkės.
- category: language_risk
  text: new wording added, small wording update, fully revised and updated versti įvairiau, kad lentelės
    nebūtų mechaniškos.
- category: language_risk
  text: standalone guideline, overview, tool, flowchart, algorithm vartoti nuosekliai ir neperkrauti anglų
    kalbos ritmika.
- category: anti_calque
  text: Lentelių pastabas rašyti kaip trumpas LT santraukas, ne kaip pažodinį release notes stilių.
- category: anti_calque
  text: Vengti to paties sakinio karkaso kartojimo kiekvienoje eilutėje.
- category: anti_calque
  text: Kiekvieną skyrių grupę pateikti kaip aiškią teminę atnaujinimų lentelę, ne kaip mechanišką eksportuotą
    registrą.
- category: localization_decision
  text: Pagrindinis LT tekstas pateikiamas kaip originalaus 2025 m. leidimo atnaujinimų suvestinė.
- category: localization_decision
  text: Lentelių pavadinimai ir pastabos išverstos į natūralią LT santraukų kalbą, bet išlaikytas originalo
    struktūrinis suskirstymas pagal skyrių grupes.
- category: localization_decision
  text: Ten, kur pastabose minimos konkrečios JK sistemos, teisės aktai, skalės ar organizacijos, jos
    paliktos tik originalo kontekste.
- category: local_practice_change
  text: Atnaujinimų komentarai neperteikti kaip LT norminiai nurodymai net ir tada, kai juose minimos
    dozės, indikacijos, monitoring'as ar algoritmai.
- category: local_practice_change
  text: Formalus originalo changelog stilius perrašytas į skaitomesnį LT lentelių santraukos stilių.
