- block_id: narrative-06-maternity
  block_type: narrative
  heading: Maternity
  source_anchor: Maternity
  source_excerpt: '| Maternity |  |  |

    | Guideline Title | Last Update | Notes |

    | Breech Birth | September 2023 | Revised standalone guideline with new algorithm. |

    | Care of the Newborn | October 2024 | Removal of APGAR score. |

    | Cord Prolapse | October 2024 | New standalone guideline. Management algorithm can also be found
    on the algorithms tab in the app. |

    | Imminent Birth | October 2024 | Fully reviewed and revised. New wording about identifying if birth
    is imminent and when to consider conveying to hospital. Inclusion of free birth, water birth, home
    birth and en caul birth. Revised management algorithm. New table of high-risk pregnancy features.
    Photos included to show estimates of volumes of blood loss. |

    | Management of Post-partum Haemorrhage (PPH) | January 2024 | New guideline. Includes a new algorithm.
    |

    | Maternal Resuscitation | July 2019 | Reviewed and updated. |'
