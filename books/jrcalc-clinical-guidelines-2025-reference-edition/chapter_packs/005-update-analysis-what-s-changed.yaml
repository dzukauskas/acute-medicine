- block_id: narrative-04-medical
  block_type: narrative
  heading: Medical
  source_anchor: Medical
  source_excerpt: '| Medical |  |  |

    | Guideline Title | Current Update | Notes |

    | Abdominal Pain | April 2025 | Revised and updated. The common causes table for adults and children
    has been revised and symptom indicators added to aid working diagnosis. Includes diagram of abdominal
    regions. |

    | Acute Behavioural Disturbance (ABD) | February 2021 | Additional wording to emphasise close monitoring
    of a restrained patient. |

    | Acute Coronary Syndrome | January 2023 | Small change to wording about health inequalities, regarding
    women and ACS. |

    | Adrenal Insufficiency Patients (formerly called Steroid-dependent Patients) | April 2025 | Reviewed
    and updated in line with NICE guidanace NG24. Note new title (previously called Steroid-dependent
    Patients). |

    | Agitated Patients | January 2023 | New guideline to sit alongside ABD. |

    | Alcohol-Use Disorders | September 2023 | A new paragraph is included on alcoholic ketoacidosis.
    |'
