- block_id: narrative-02-general-guidance
  block_type: narrative
  heading: General Guidance
  source_anchor: General Guidance
  source_excerpt: '| General Guidance |  |  |

    | Guideline Title | Last Update | Notes |

    | Clinical Considerations in Relation to Diversity and Equality | April 2025 | New wording added around
    pulse oximetry in dark skin, and also regarding terminology in the disability section. |

    | Conditions Requiring Specific Prehospital Clinical Management | July 2024 | New guideline covering
    a number of clinical presentations where specific pre-hospital clinical considerations are needed.
    |

    | Consent in Pre-hospital Care | September 2021 | Reviewed and updated. |

    | Domestic Abuse | September 2022 | Revised and updated with current legislation. |

    | Duty of Care | May 2021 | Reviewed and updated. |

    | End of Life Care | May 2021 | Reviewed and updated and includes the Macmillan/UKONS tool. |'
