- block_id: narrative-05-trauma
  block_type: narrative
  heading: Trauma
  source_anchor: Trauma
  source_excerpt: '| Low Back Pain (Non-traumatic) | September 2022 | Guidance on the assessment and management
    of this common presentation. |

    | Management and Resuscitation of Patients with Left Ventricular Assist Devices (LVADs) | April 2025
    | Revised and updated. Small changes include: If possible, anterior-posterior pad positioning would
    be preferable based on the LVAD position within the chest wall. LVAD centre emergency contacts numbers
    were checked for accuracy. |

    | Medical Emergencies in Adults – Overview | February 2022 | New wording around frailty scoring added;
    consider using the clincial frailty scale, as per local pathways. |

    | Medical Emergencies in Children – Overview | February 2021 | New reference added, linking to an
    interactive education tool. |

    | Meningococcal Meningitis and Septicaemia | July 2019 | Reviewed and updated. |

    | Mental Health Presentations | May 2023 | Completely revised guideline. |

    | Non-Traumatic Chest Pain/Discomfort | July 2019 | Reviewed and updated. |

    | Overdose and Poisoning in Adults and Children | October 2024 | Revised and updated guideline with
    support from the National Poison Information Service (NPIS) and RCEM toxicologists. New algorithm
    included. Substance management table removed. |'
