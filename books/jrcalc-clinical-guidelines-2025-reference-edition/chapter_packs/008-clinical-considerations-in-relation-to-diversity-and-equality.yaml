- block_id: narrative-05-health-inequality-and-cognitive-bias
  block_type: narrative
  heading: Health Inequality and Cognitive Bias
  source_anchor: Health Inequality and Cognitive Bias
  source_excerpt: '2.2 Health Inequality and Cognitive Bias

    - There are strong correlations between some of the protected characteristics and health inequalities
    with certain groups.

    - The causes for this are multifactorial and where bias or discrimination are contributing factors
    this should be recognised and minimised.

    - At an individual level practitioners should be aware that their preconceptions and liability to
    cognitive bias can influence how they perceive and care for patients and actively minimise their impact.
    1

    2.3 Inadvertent Bias and Preconceptions in the Initial Approach to Patients

    - It is important to achieve rapport and mutual respect with the people we care for in order for them
    to be best able to confide in us with the confidence that they will be respected.

    - This enables them to receive the most appropriate care and for the practitioner to carry out the
    best possible assessment.

    - The words we use can impact on how people respond to us and how they feel about the care they are
    given, but importantly, it is good practice when approaching a patient to ask them how they would
    like to be known.'
