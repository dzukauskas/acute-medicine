- block_id: narrative-11-learning-disability
  block_type: narrative
  heading: Learning Disability
  source_anchor: Learning Disability
  source_excerpt: '5.1 Learning Disability

    - A learning disability (LD) is a reduced intellectual ability and difficulty with everyday activities,
    e.g. household tasks, socialising or managing money, that affects someone for their whole life. The
    level of impairment can vary from mild to severe in all conditions.

    - A learning disability is different from a learning difficulty, as a learning difficulty does not
    affect general intellect. Examples of learning difficulties include attention deficit-hyperactivity
    disorder (ADHD) and dyslexia.

    - People with learning disabilities are likely to die 20 years earlier than people without them. Reasons
    include increased comorbidities, challenges with accessing healthcare, difficulties in assessment
    and inappropriate or delayed care. 3 , 4

    - People with LD are up to 5 times more likely to die of something treatable compared to others. 3

    - The top three causes of death in people with LD are respiratory illness, cardiovascular disease
    and cancer. 4

    - 2.16% of adults and 2.5% of children have a learning disability. 5

    - People with dementia, frailty needs, mental health problems and other communication needs are also
    at higher risk of ill health. This is for similar reasons to people with learning disabilities, such
    as difficulties accessing healthcare, multiple comorbidities, medications and assessment challenges.'
