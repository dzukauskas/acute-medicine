- block_id: narrative-06-inadvertent-bias-and-preconceptions-in-the-initial-approach-to-patients
  block_type: narrative
  heading: Inadvertent Bias and Preconceptions in the Initial Approach to Patients
  source_anchor: Inadvertent Bias and Preconceptions in the Initial Approach to Patients
  source_excerpt: '2.3 Inadvertent Bias and Preconceptions in the Initial Approach to Patients

    - It is important to achieve rapport and mutual respect with the people we care for in order for them
    to be best able to confide in us with the confidence that they will be respected.

    - This enables them to receive the most appropriate care and for the practitioner to carry out the
    best possible assessment.

    - The words we use can impact on how people respond to us and how they feel about the care they are
    given, but importantly, it is good practice when approaching a patient to ask them how they would
    like to be known.

    - A patient’s recorded name on medical records may be different to what they would like to be called.

    - Clinicians should use and record the patient’s chosen name, especially when handing over care of
    the patient to other health care professionals so as to ensure the correct name is used for the patient
    further down the chain of care. Clinicians should ask patients what pronouns they use in much the
    same way we ask what patients would like to be called. This could be especially important for certain
    groups of people, for example people with gender dysphoria.

    2.4 Direct and Indirect Discrimination

    Direct discrimination is said to have occurred when a person is treated unfairly as a result of their
    protected characteristic. This can occur because that person has a protected characteristic, or is
    perceived to have that characteristic, or be connected to a person with that characteristic.'
