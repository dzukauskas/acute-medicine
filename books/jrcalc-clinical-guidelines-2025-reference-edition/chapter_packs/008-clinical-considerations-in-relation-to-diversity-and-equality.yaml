  source_anchor: Current Areas for Development not Completely within the Remit of JRCALC
  source_excerpt: '11. Current Areas for Development not Completely within the Remit of JRCALC

    - As stated at the start of this chapter, promoting equality and removing particularly inadvertent
    or indirect bias is a continuing challenge for organisations. JRCALC references national standards
    of practice which reflect the current limitations of evidence and policy, but where we feel there
    are opportunities to reflect if the science and practice of medicine allows us to remove bias, we
    will undertake to do this.

    - With this in mind we are having conversations regarding skin tone and colour in currently widely
    used tools.

    - Tools under discussion include: NICE Fever in Children guidance APGAR scoring CRESS tool Pulse oximetry

