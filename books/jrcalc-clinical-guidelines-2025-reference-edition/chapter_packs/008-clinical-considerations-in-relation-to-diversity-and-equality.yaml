- block_id: narrative-16-overview
  block_type: narrative
  heading: Overview
  source_anchor: Overview
  source_excerpt: '7.1 Overview

    - In 2021 1.5 million people (3.2% of the population aged 16 years and over) identified as having
    a sexuality other than heterosexual. 11

    - Conditions such as depression, anxiety, self-harm and substance misuse including alcohol are found
    with greater frequency amongst the LGBT+ community than in the general population. 12

    - These can have a basis in their experience of hostility and discrimination because of their sexual
    orientation.

    - Clinicians should be aware of these often-hidden health issues and reflect these in their clinical
    assessment and practice.

    7.2 Consent to Sharing Sexual Orientation with Other Health Professionals

    - Clinicians taking a social history from patients and asking about family and support structures
    must not make assumptions as to sexuality.

    - Where relevant information regarding a patient’s sexuality has been obtained, this information should
    be recorded and handed over to other health care professionals with the patient’s consent, to ensure
