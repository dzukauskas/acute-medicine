- block_id: narrative-20-transitioning
  block_type: narrative
  heading: Transitioning
  source_anchor: Transitioning
  source_excerpt: '8.2 Transitioning

    - Some patients who discover that their gender identity is not that which they were assigned at birth,
    may decide to begin transitioning to their actual gender.

    | Col 1 |

    | --- |

    | Social transitioning occurs when the individual has begun to inform others – also known as coming
    out. Medical transitioning involves individuals taking steps to change their appearance in a more
    permanent way. |

    - Some acts of Social Transitioning: Changing their names either legally or socially Using pronouns
    in their preferred gender Using the bathroom of their preferred gender Adopting the traditional clothing
    and hairstyle of their gender Using binders to reduce the appearance of breasts or implants to increase
    breast size Using packers to replicate the appearance of male genitalia through underwear or tucking
    to conceal genitalia.

    - Some acts of Medical Transitioning: Taking hormones to induce endocrinological changes. Gender confirmation
    surgery on genitalia (sometimes referred to as bottom surgery) Breast removal/breast augmentation
    (sometimes referred to as top surgery) Facial surgery Laser hair removal

    8.3 Considering Transition when Providing Emergency Care'
