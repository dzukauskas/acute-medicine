- block_id: narrative-27-person-centred-language
  block_type: narrative
  heading: Person Centred Language
  source_anchor: Person Centred Language
  source_excerpt: '10.2 Person Centred Language

    - Person centred language reflects good manners and helps develop empathy facilitating good communication
    and care.

    - The general approach should be to describe the person with a disease or impairment not as a condition
    or disability. i.e. Person with diabetes, not a diabetic.

    - It may be more appropriate to describe the adjustment that needs to be considered rather than the
    specific condition, i.e. John has some communication difficulties and finds it easier to lip read.
    This is important as many conditions and impairments produce different levels of disability for people,
    i.e. restricted vision and uses visual aids may have different needs to someone with little or no
    vision who needs written material in a different format or uses an electronic reading device.

    - The table produced below is for illustration rather than a complete list. 28

