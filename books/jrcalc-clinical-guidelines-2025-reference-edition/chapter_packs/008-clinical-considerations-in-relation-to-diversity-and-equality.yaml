    Clinical Considerations in Relation to Diversity and Equality

    1. Introduction

    - The people we care for come from a diverse set of heritages and with individual needs and expectations
    from their healthcare providers. There is an expectation that the care they receive is delivered in
    a sensitive and respectful manner and in a manner that is accessible to them.

    - The JRCALC guidelines seek to set out the clinical practice and approach to the people who seek
    help from ambulance services. In a diverse society we need to understand how our clinical practice
    needs to flex and adapt to ensure an equity of care for all.

    - The JRCALC guidelines of their nature are subject to change and are never static as they manage
    often incomplete scientific knowledge and changes in society and behaviour.'
