- block_id: narrative-12-neurodivergence
  block_type: narrative
  heading: Neurodivergence
  source_anchor: Neurodivergence
  source_excerpt: '5.2 Neurodivergence

    - Neurodiversity: this term means that some people’s brains work in a way that is unique to them.
    The general population is neurodiverse, with a wide range of variation in how people’s brains work.

    - Neurotypical: this is a term used to broadly describe how the majority of people’s brains work.

    - Neurodivergent: this includes autistic people, those with ADHD or dyslexia, and those with other
    types of neurodivergence including forms of learning difficulty (as opposed to learning disability).

    - There are many different types of learning difficulty. Some of the more well-known are dyslexia,
    ADHD, dyspraxia and dyscalculia. A person can have one, or a combination.

    - Some neurodivergent people will have a learning disability too, although most will not.

    - Some neurodivergent people will face challenges with communication.

    - Autism is a form of neurodivergence. Every autistic patient is different, with different strengths
    and challenges.'
