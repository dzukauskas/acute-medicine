- block_id: narrative-02-introduction
  block_type: narrative
  heading: Introduction
  source_anchor: Introduction
  source_excerpt: '1. Introduction

    - The people we care for come from a diverse set of heritages and with individual needs and expectations
    from their healthcare providers. There is an expectation that the care they receive is delivered in
    a sensitive and respectful manner and in a manner that is accessible to them.

    - The JRCALC guidelines seek to set out the clinical practice and approach to the people who seek
    help from ambulance services. In a diverse society we need to understand how our clinical practice
    needs to flex and adapt to ensure an equity of care for all.

    - The JRCALC guidelines of their nature are subject to change and are never static as they manage
    often incomplete scientific knowledge and changes in society and behaviour.

    - This section is no different and reflects a starting point in an area where societal custom and
    attitudes are changing rapidly and where scientific evidence regarding best approaches and clinical
    practice are incomplete.

    - There is a commitment as with all guidelines that where there is new evidence or changes to consensus
    on approach these will be reflected.

    - This section contains the background and underpinning information to support an inclusive approach.
    Individual guidelines will contain the accommodations or flexing of clinical practice that may help
    ensure the best assessment and delivery of care to an individual.

    2. Why do we Need to Flex our Clinical Practice?'
