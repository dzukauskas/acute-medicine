- block_id: narrative-14-maternity-and-gender-related-conditions
  block_type: narrative
  heading: Maternity and Gender Related Conditions
  source_anchor: Maternity and Gender Related Conditions
  source_excerpt: '6. Maternity and Gender Related Conditions

    - The maternity section in the guidelines, uses the term ‘woman, women or mother’ in relation to the
    gynaecological and pregnancy related conditions that ambulance clinicians may be called to assess
    and manage.

    - This is consistent with where other conditions traditionally associated with males are considered
    and the term ‘man and men’ are used.

    - It is acknowledged that these terms do not reflect the diverse range of patients that you may see
    with such conditions including those who identify as non-binary or transgender.

    - We will keep this language under review and acknowledge that there is as yet a lack of consensus
    in clinical practice as how best to reflect these issues and challenges.

    - Language aside it is important that when assessing all patients to be mindful of drawing erroneous
    conclusions related to perceived gender related diagnoses.

    - Where clinically appropriate gender-neutral descriptions will be adopted.

    7. Sexual Orientation'
