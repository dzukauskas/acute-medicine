- block_id: narrative-21-considering-transition-when-providing-emergency-care
  block_type: narrative
  heading: Considering Transition when Providing Emergency Care
  source_anchor: Considering Transition when Providing Emergency Care
  source_excerpt: '8.3 Considering Transition when Providing Emergency Care

    - Always consider the gender of a patient might not be obvious or what they were assigned at birth.
    While it is preferred that patients are referred to by their names and pronouns, consideration as
    to both their gender assigned at birth and their current stage of transition is essential for the
    provision of good medical care. Male and non-binary patients may need to be screened for medical emergencies
    such as ectopic pregnancy, while female and non-binary patients may need to be screened for medical
    emergencies such as testicular torsion.

    - Clinicians should consider undertaking a relevant history of transition including any social, hormonal
    and surgical elements of the individual’s transition. These should be recorded, and any relevant details
    noted, then handed over to other relevant health care professionals as required. 13

    - Patients may be reluctant to consent to this information being shared, so it is important that clinicians
    ensure the patient understands the importance of this information to the provision of proper medical
    care. Patients should be reassured that their current name, pronouns and gender identity will also
    be handed over alongside their assigned gender identity and birth and transitional history.

    8.4 Disorders of Sex Development

    - There are also people that do not fit the binary physical classification of male or female, these
    people were previously known as Intersex. 14

    - Due to the complexity of the various conditions that may be considered intersex (e.g. Klinefelter
    syndrome, Turners syndrome, XXX, XYY, X0, XXYY to name only a few), the clinician may need to ask
    their patient about how the condition affects them and if they have any particular treatment requirements.

    8.5 Gender Dysphoria'
