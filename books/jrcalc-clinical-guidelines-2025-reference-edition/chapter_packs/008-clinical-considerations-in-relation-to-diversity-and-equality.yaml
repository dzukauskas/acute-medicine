- block_id: narrative-19-what-is-transgender-non-binary
  block_type: narrative
  heading: What is transgender/non-binary?
  source_anchor: What is transgender/non-binary?
  source_excerpt: '8.1 What is transgender/non-binary?

    - The sex of all children born in the UK is observed, confirmed and recorded at birth. This is usually
    based on their genitalia and traditionally that child is then raised in a way which matches this assigned
    sex. A minority find that how they view themselves and their gender does not match with the sex they
    were assigned. Identifying as a different gender to that recorded at birth is what makes someone transgender.

    - If someone finds that their gender identity does not fit with the male/female binary and they identify
    more as someone else or in-between, then they commonly will identify as non-binary.

    - There is no one size fits all approach to the provision of care for transgender/non-binary patients.
    Some patients may identify in ways not covered in these guidelines. If in doubt – ask. The patient
    is the expert on their own experiences and will be able to clarify how they would like you to refer
    to them.

    8.2 Transitioning

    - Some patients who discover that their gender identity is not that which they were assigned at birth,
    may decide to begin transitioning to their actual gender.

