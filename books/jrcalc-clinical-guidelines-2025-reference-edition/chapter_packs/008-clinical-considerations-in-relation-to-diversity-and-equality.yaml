- block_id: narrative-17-consent-to-sharing-sexual-orientation-with-other-health-professionals
  block_type: narrative
  heading: Consent to Sharing Sexual Orientation with Other Health Professionals
  source_anchor: Consent to Sharing Sexual Orientation with Other Health Professionals
  source_excerpt: '7.2 Consent to Sharing Sexual Orientation with Other Health Professionals

    - Clinicians taking a social history from patients and asking about family and support structures
    must not make assumptions as to sexuality.

    - Where relevant information regarding a patient’s sexuality has been obtained, this information should
    be recorded and handed over to other health care professionals with the patient’s consent, to ensure
    this information is available for those caring for the patient further along the chain of care.

    - Patients may be reluctant to consent to this information being shared. Where the regarding sexual
    orientation is relevant to possible diagnosis and could alter or influence care, it is expected that
    the professional will encourage the individual patient to allow sharing of this sensitive information.

    8. Gender

    8.1 What is transgender/non-binary?

    - The sex of all children born in the UK is observed, confirmed and recorded at birth. This is usually
    based on their genitalia and traditionally that child is then raised in a way which matches this assigned
    sex. A minority find that how they view themselves and their gender does not match with the sex they
    were assigned. Identifying as a different gender to that recorded at birth is what makes someone transgender.

    - If someone finds that their gender identity does not fit with the male/female binary and they identify
    more as someone else or in-between, then they commonly will identify as non-binary.'
