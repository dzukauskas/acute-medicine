- block_id: narrative-22-disorders-of-sex-development
  block_type: narrative
  heading: Disorders of Sex Development
  source_anchor: Disorders of Sex Development
  source_excerpt: '8.4 Disorders of Sex Development

    - There are also people that do not fit the binary physical classification of male or female, these
    people were previously known as Intersex. 14

    - Due to the complexity of the various conditions that may be considered intersex (e.g. Klinefelter
    syndrome, Turners syndrome, XXX, XYY, X0, XXYY to name only a few), the clinician may need to ask
    their patient about how the condition affects them and if they have any particular treatment requirements.

    8.5 Gender Dysphoria

    - Gender dysphoria (GD) is a term that describes a sense of unease that a person may have because
    of a mismatch between their biological sex and their gender identity.

    - Gender dysphoria is a constellation of symptoms experienced by most trans/non-binary people. This
    can be experienced as physical discomfort, and psychological and emotional distress. Deadnaming an
    individual or using the wrong pronouns can trigger dysphoria in patients. Clinicians should use the
    right pronouns and name for a patient.

    - People with gender dysphoria may have a range of feelings and behaviours that show discomfort or
    distress. The level of distress can be severe and affect all areas of their life.

    - Gender dysphoria is not a mental illness, but some people may develop mental health problems because
    of gender dysphoria.'
