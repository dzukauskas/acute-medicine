- block_id: narrative-23-gender-dysphoria
  block_type: narrative
  heading: Gender Dysphoria
  source_anchor: Gender Dysphoria
  source_excerpt: '- Clinicians should use and record the patient’s chosen name, especially when handing
    over care of the patient to other health care professionals so as to ensure the correct name is used
    for the patient further down the chain of care. Clinicians should ask patients what pronouns they
    use in much the same way we ask what patients would like to be called. This could be especially important
    for certain groups of people, for example people with gender dysphoria.

    2.4 Direct and Indirect Discrimination

    Direct discrimination is said to have occurred when a person is treated unfairly as a result of their
    protected characteristic. This can occur because that person has a protected characteristic, or is
    perceived to have that characteristic, or be connected to a person with that characteristic.

    Indirect discrimination arises when circumstances are applied equally to a population, but this disproportionately
    discriminates against a proportion of that population with a shared protected characteristic leading
    to personal disadvantage.

    3. Ethnicity and Race

    - We refer to ethnicity and not race to reflect the heritage and cultural identity of an individual.
    We should recognise and reflect in our practice the different cultural differences and concerns regarding
    health and wellbeing.

    - Consent to examination and/or treatment may legitimately be restricted by cultural, religious or
    ethnic expectations. Care should be taken to be respectful of the restrictions the individual may
    place on their care. Refer to Consent in Pre-Hospital Care .

    - Consideration should be given to how reasonable adjustments may be made to overcome such difficulties
    by either modifying the treatment offered or offering examination by a same sex practitioner. (Local
    practice and guidance should be followed.) Consent where communication is limited and or comprehension
    not clear, such as where there are language barriers or learning difficulties, should be handled sensitively
    and in line with the Mental Capacity Act 2005. 2'
