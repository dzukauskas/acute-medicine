    4. Skin Colour and Tone

    General principles

    - Skin tone refers to the individual combination of pigmentation in a person’s skin, whilst skin colour
    can change when a person is unwell.

    - Assess for skin changes closely using natural light if possible (or non-fluorescent light to avoid
    a blue tinge). Lighting conditions can affect how you see changes in skin colour.

    - Palpate the skin for a raised rash or swelling and/or local changes in skin temperature.'
