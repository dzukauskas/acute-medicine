- block_id: narrative-03-why-do-we-need-to-flex-our-clinical-practice
  block_type: narrative
  heading: Why do we Need to Flex our Clinical Practice?
  source_anchor: Why do we Need to Flex our Clinical Practice?
  source_excerpt: '2. Why do we Need to Flex our Clinical Practice?

    - The purpose of this work is to create best clinical practice within a diverse society and optimise
    patient care. Failure to recognise when care or clinical practice needs to be flexed or adapted can
    result in poor outcomes for the individual.

    - Different patient groups and individuals will have different needs to others, and illness and diseases
    may present differently or need additional consideration if we are to manage them appropriately and
    equally.

    - The skill and requirement to be able to flex our practice is therefore a clinical, professional,
    and ethical outcome.

    - Additionally, for many of these groups there is a legal requirement to adapt care and approach where
    required.

    2.1 Equality Act 2010

    - The Equality Act 2010 sets out nine protected characteristics of individuals and places a requirement
    on those providing services to them to do so without discrimination and to make reasonable adaptions
    where required to provide equal access to those services.

    Protected Characteristics (Equality Act 2010)'
