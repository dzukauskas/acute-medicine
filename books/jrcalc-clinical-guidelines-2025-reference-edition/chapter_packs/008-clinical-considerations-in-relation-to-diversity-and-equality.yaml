- block_id: narrative-13-general-principles
  block_type: narrative
  heading: General Principles
  source_anchor: General Principles
  source_excerpt: 'General principles

    - Skin tone refers to the individual combination of pigmentation in a person’s skin, whilst skin colour
    can change when a person is unwell.

    - Assess for skin changes closely using natural light if possible (or non-fluorescent light to avoid
    a blue tinge). Lighting conditions can affect how you see changes in skin colour.

    - Palpate the skin for a raised rash or swelling and/or local changes in skin temperature.

    - Consider moistening the skin (if unbroken) to enhance the visibility of skin changes.

    - If erythema is identified, it may be pink, purple or red, or the skin may become darker than the
    surrounding area.

    - Contusions may only be seen as an area of skin that is darker than its surroundings. They could
    alternatively be a purple/maroon or green/yellow colour.

    - Peripheral cyanosis may be difficult to detect. Use natural light (or non-fluorescent light to avoid
    a blue tinge) and examine the lips, mucous membranes and tongue for central cyanosis.'
