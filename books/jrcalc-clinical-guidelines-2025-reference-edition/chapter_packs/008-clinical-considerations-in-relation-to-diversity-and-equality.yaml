style_hotspots:
- category: language_risk
  text: equality šiame skyriuje neturi būti susiaurinta vien iki lygybės; LT klinikiniame kontekste dažnai
    tikslesnė forma yra lygių galimybių užtikrinimas.
- category: language_risk
  text: equity of care geriau perteikti kaip vienoda ir teisinga prieiga prie priežiūros, o ne pažodinį
    priežiūros lygybė.
- category: language_risk
  text: learning disability ir learning difficulty negalima suplakti.
- category: language_risk
  text: gender dysphoria, gender incongruence, transgender, non-binary turi būti vartojami nuosekliai
    ir pagarbiai.
- category: language_risk
  text: darker skin nevartoti taip, lyg šviesi oda būtų norma.
- category: anti_calque
  text: Vengti pažodinių biurokratinių konstrukcijų iš tipo flex clinical practice; LT tekste rašyti pritaikyti
    klinikinę praktiką, prisitaikyti prie paciento poreikių.
- category: anti_calque
  text: Socialinių ir kultūrinių skirtumų aprašus versti trumpiau ir konkrečiau, vengiant perteklinės
    deklaratyvios anglų prozos.
- category: anti_calque
  text: Ten, kur originale vardijami JK mokymai ar organizacijos, neperkrauti LT teksto nereikalingais
    proper noun, jei jie neturi tiesioginės klinikinės vertės.
- category: localization_decision
  text: Pagrindinis LT tekstas orientuojamas į įtraukų ir prieinamą klinikinį bendravimą, ne į JK teisinės
    sistemos aprašymą.
- category: localization_decision
  text: JK teisės aktai paliekami tik kaip originalo kontekstas, o pagrindiniai veiklos principai perrašomi
    pagal LT pacientų teisių, lygių galimybių ir negalios teisių logiką.
- category: localization_decision
  text: Socialiai ir kultūriškai jautrūs terminai verčiami kuo mažiau ideologizuotai ir kuo labiau kliniškai
    bei pagarbiai.
- category: localization_decision
  text: Terminai, kurių LT vartosena nėra visiškai nusistovėjusi (neurodivergent, deadname, deadnaming,
    binder, packer), tekste aiškinami aprašomai, nepromuojant jų į bendrą aktyvią terminų bazę.
- category: local_practice_change
  text: Equality Act 2010 pakeistas nuoroda į LT nediskriminavimo principus, vietoje pažodinio JK teisės
    akto perkėlimo.
- category: local_practice_change
  text: Mental Capacity Act 2005 funkciškai pakeistas LT paciento teisių, informuoto sutikimo ir atstovavimo
    logika.
- category: local_practice_change
  text: GP ir Gender Dysphoria clinic siuntimo logika pakeista į bendrą LT sveikatos sistemos kelią.
- category: local_practice_change
  text: woman / women / mother vartosena išlaikyta ten, kur kalbama apie ginekologines ar nėštumo būkles,
    bet papildomai aiškiai pripažįstama, kad klinikinėje praktikoje gali būti ir kitų lytinių tapatybių
    pacientų.
