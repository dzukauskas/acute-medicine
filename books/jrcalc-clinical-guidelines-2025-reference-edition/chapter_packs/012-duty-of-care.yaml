- block_id: narrative-08-key-points
  block_type: narrative
  heading: KEY POINTS!
  source_anchor: KEY POINTS!
  source_excerpt: 'KEY POINTS!

    Duty of Care

    - The duty of care requires ambulance clinicians to achieve a careful balance. They must take reasonable
    steps to ensure they are as safe as is realistically possible, but they must also be prepared to accept
    some risk to deliver effective care to patients in the pre-hospital setting. They must also be sufficiently
    trained and experienced to act quickly where life is at risk.

    - To do this they must: Implement an approved safe system of work and associated procedures. Avoid
    any unreasonable delays in providing emergency care to patients that require it.'
