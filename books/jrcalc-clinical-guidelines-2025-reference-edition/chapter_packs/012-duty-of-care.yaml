- block_id: narrative-06-article-2-the-right-to-life
  block_type: narrative
  heading: Article 2 – The Right to Life
  source_anchor: Article 2 – The Right to Life
  source_excerpt: '5. Article 2 – The Right to Life

    - It has been recognised that Article 2 of the Human Rights Act 1998 creates a positive duty on public
    sector organisations, including the NHS ambulance services, to do all they reasonably can to protect
    those they know, or ought to know, are at real and immediate risk ( Van Colle v CC of Hertfordshire
    [2007] EWCA Civ 325).

    - However, there may be occasions where it is justifiable not to act immediately to save someone’s
    life. For example, ambulance clinicians are not under a duty to sacrifice their own life to save a
    patient.

    - If you manage to effectively balance two fundamental duties of care by putting a safe system of
    work in place and avoiding any unreasonable delay in providing care to patients, then you will invariably
    discharge your obligations under Article 2.

    6. Appendix – Duty of Care Aide Memoire

    - The aide memoire depicted in Table 1.2 has been developed to assist you in applying the duty of
    care correctly.

