    Duty of Care

    1. Introduction

    - It is obvious that ambulance clinicians have a duty to provide care to their patients but establishing
    exactly how that duty applies during high-risk emergency situations can be challenging.

    - The duty of care represents moral, professional and legal obligations. The moral obligation to provide
    care is a matter of individual and social conscience. The professional obligation arises from a clinician’s
    professional registration and organisational procedures or national best practice guidelines. The
    legal obligation arises from several sources which are summarised below.

    - It is particularly hard for ambulance clinicians to discharge their duty of care correctly at incidents
    where patients need clinical interventions but hazards expose responders to considerable risk.'
