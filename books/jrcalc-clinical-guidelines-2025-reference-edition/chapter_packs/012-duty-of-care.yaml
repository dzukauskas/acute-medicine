- block_id: narrative-04-health-and-safety-duties
  block_type: narrative
  heading: Health and Safety Duties
  source_anchor: Health and Safety Duties
  source_excerpt: '3. Health and Safety Duties

    - The Health and Safety at Work Act 1974 and associated regulations require ambulance clinicians to
    have a safe system of work. NHS ambulance services have a legal duty to implement and maintain safe
    systems of work for their employees, and in turn employees have a legal duty to comply with these
    systems.

    - A safe system of work is usually achieved through: Effective operating procedures Staff competence
    (qualifications and training) Fit for purpose equipment Effective risk assessments.

    - This means ambulance clinicians should: Ensure they and their colleagues engage in approved activities
    which have procedures and controls in place to mitigate the risks Ensure that they are competent to
    perform those activities (i.e. they have been suitably trained to do it and that training is up to
    date or current) Ensure that they have the necessary equipment for those activities and the equipment
    being used is fit for purpose (i.e. appropriately maintained). This includes personal protective equipment
    (PPE) Ensure that staff are aware of pre-existing generic risk assessments for the specific activity
    being undertaken and that subsequent dynamic risk assessments are used just prior to committing to
    the activity so that specific situational hazards and risks are considered.

    - A safe system of work does not necessarily mean one which is free of risk. It is one where the risk
    is being appropriately managed or controlled. Given the nature of pre-hospital ambulance work, a level
    of risk exposure will need to be accepted.

    - Safe systems of work must also be reviewed periodically and/or when the work activity or risk changes.
    NHS ambulance services must also implement appropriate monitoring/supervision to ensure compliance
    with the safe system of work.

    4. The Tort of Negligence

    - The emergency services (including police and fire and rescue services) do not generally owe a legal
    duty of care to individual members of the public except in certain, limited circumstances ( Hill v
    Chief Constable of West Yorkshire [1989] AC 53 (HL)). Their duty is focused more on protecting the
    public ‘at large’.'
