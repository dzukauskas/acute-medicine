- block_id: narrative-03-application
  block_type: narrative
  heading: Application
  source_anchor: Application
  source_excerpt: '2. Application

    The duty of care applies to ambulance clinicians and managers in two fundamental ways:

    1. Staff safety: The duty to keep yourself and your team safe.

    2. Patient care: The duty to provide a reasonable standard of care to your patient.

    Whilst the United Kingdom has three separate jurisdictions – England and Wales, Scotland and Northern
    Ireland – the duty of care principles are broadly consistent throughout.

    3. Health and Safety Duties

    - The Health and Safety at Work Act 1974 and associated regulations require ambulance clinicians to
    have a safe system of work. NHS ambulance services have a legal duty to implement and maintain safe
    systems of work for their employees, and in turn employees have a legal duty to comply with these
    systems.

    - A safe system of work is usually achieved through: Effective operating procedures Staff competence
    (qualifications and training) Fit for purpose equipment Effective risk assessments.'
