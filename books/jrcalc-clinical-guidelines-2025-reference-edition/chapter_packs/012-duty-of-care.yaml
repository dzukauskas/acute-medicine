- block_id: narrative-05-the-tort-of-negligence
  block_type: narrative
  heading: The Tort of Negligence
  source_anchor: The Tort of Negligence
  source_excerpt: '4. The Tort of Negligence

    - The emergency services (including police and fire and rescue services) do not generally owe a legal
    duty of care to individual members of the public except in certain, limited circumstances ( Hill v
    Chief Constable of West Yorkshire [1989] AC 53 (HL)). Their duty is focused more on protecting the
    public ‘at large’.

    - The law will recognise a breach of duty by Police or Fire and Rescue Services if they have acted
    in a certain way in certain specific situations ( Caparo Industries Plc v Dickman [1990] 2 AC 605).

    - However, the NHS Ambulance Service has an established legal duty to provide a reasonable standard
    of care to patients without unreasonable delay. This is a positive duty which engages from the point
    at which the Ambulance Service accepts the emergency call and agrees to attend ( Kent v Griffiths
    [2001] QB 36).

    - A reasonable standard of care relates to clinical care that can be supported by a responsible body
    of medical opinion ( Bolam v Friern Hospital Management Committee [1957] 2 All ER 118). The opinion
    relied upon must have a logical basis ( Bolitho v City and Hackney Health Authority [1998] AC 232).
    With regard to the clinical practice of ambulance staff, these standards are set out in approved clinical
    practice guidelines and the standards set by relevant professional bodies.

    - This puts the ambulance service in a position where the care provided or any unreasonable delay
    in the provision of care may need to be explained and legally justified to avoid liability. Failure
    to discharge this duty could expose the ambulance service to a charge of clinical negligence.

    5. Article 2 – The Right to Life

    - It has been recognised that Article 2 of the Human Rights Act 1998 creates a positive duty on public
    sector organisations, including the NHS ambulance services, to do all they reasonably can to protect
    those they know, or ought to know, are at real and immediate risk ( Van Colle v CC of Hertfordshire
    [2007] EWCA Civ 325).'
