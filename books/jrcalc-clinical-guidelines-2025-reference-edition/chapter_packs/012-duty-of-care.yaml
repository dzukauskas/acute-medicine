style_hotspots:
- category: language_risk
  text: duty / duty of care gali skatinti per dažną pažodinį pareiga kartojimą; reikės saugoti LT sakinių
    ritmą.
- category: language_risk
  text: reasonable standard of care, positive duty, clinical negligence lengvai virsta teisės kalbos kalkėmis.
- category: language_risk
  text: safe system of work ir dynamic risk assessment turi būti aiškūs LT GMP skaitytojui, bet neperkrauti
    anglišku žodynų skoniu.
- category: anti_calque
  text: Vengti konstrukcijų tipo pasiekti balansą tarp pareigų; geriau suderinti dvi pareigas arba išlaikyti
    pusiausvyrą tarp darbuotojų saugos ir pagalbos pacientui.
- category: anti_calque
  text: Vengti pažodinio commit to the activity; LT tekste priklausomai nuo konteksto vartoti imtis veiksmų,
    pradėti veikti, įsitraukti į veiksmą.
- category: anti_calque
  text: discharge their duty nepalikti kaip išpildyti pareigą; geriau tinkamai įvykdyti pareigą arba tinkamai
    ją vykdyti.
- category: localization_decision
  text: Skyriaus pavadinimui kol kas renkuosi Rūpestingumo pareiga, nes toks atitikmuo užfiksuotas LT
    medicinos teisės vartosenoje; drafto metu tikrinsiu, ar tekste natūralesnis nebus mišrus modelis rūpestingumo
    pareiga (pareiga rūpintis pacientu).
- category: localization_decision
  text: 'safe system of work versti ne pažodiniu biurokratiniu kalkiu, o per LT darbo saugos ir GMP organizavimo
    logiką: saugaus darbo organizavimo tvarka arba saugi darbo sistema, atsižvelgiant į sakinio funkciją.'
- category: localization_decision
  text: dynamic risk assessment LT tekste galima vartoti kaip dinaminis rizikos vertinimas, nes toks terminas
    egzistuoja ES DSS LT vertime.
- category: localization_decision
  text: reasonable standard of care geriausia ne mechaniniu teisiniu vertiniu, o kaip tinkamos kokybės
    priežiūra / pagrįstai pakankamas priežiūros lygis, priklausomai nuo sakinio.
- category: localization_decision
  text: Source ambulance clinician(s) šioje knygoje užrakintas kaip GMP medikas / GMP medikai, ne kaip
    GMP klinicistas / GMP klinicistai; LT oficialioje vartosenoje remtis konkrečiais vaidmenimis (paramedikas,
    skubiosios medicinos pagalbos paramedikas) ir instituciniu bendriniu greitosios medicinos pagalbos
    medikai / GMP darbuotojai. Taisyklė promuota į termbase.local.tsv, o klinicist- stem'as uždraustas
    per local prose taisykles.
- category: local_practice_change
  text: JK darbuotojų saugos teisės aktų sluoksnis pagrindiniame LT tekste bus pakeistas LT darbuotojų
    saugos, profesinės rizikos vertinimo ir GMP darbuotojų saugumo logika.
- category: local_practice_change
  text: Article 2 dalyje vietoje Human Rights Act 1998 pagrindiniame LT tekste bus remiamasi oficialiu
    EŽTK 2 straipsniu.
- category: local_practice_change
  text: JESIP eilutė lentelėje bus perkelta į bendrą tarpinstitucinio rizikos vertinimo ir vietinių algoritmų
    logiką.
