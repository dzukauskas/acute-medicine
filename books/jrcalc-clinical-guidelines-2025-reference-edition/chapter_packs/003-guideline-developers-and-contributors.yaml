    Guideline Developers and Contributors

    The authors and editors would like to thank everyone who has contributed to the JRCALC guidelines.
    Many people have given freely and generously of their time and expertise to help draft, develop and
    improve the guidelines. In particular, we wish to acknowledge the work of the members of the Joint
    Royal Colleges Ambulance Liaison Committee, the National Ambulance Service Medical Directors group,
    the Ambulance Lead Paramedics group, Ambulance Pharmacists Network and national groups for End of
    Life, Safeguarding and Maternity. Other contributors have come from a variety of multidisciplinary
    groups which include healthcare professionals, educators and patients.

    EDITORIAL LEADS

    Dr Simon Brown, GP and Assistant Medical Director, South Central Ambulance Service, JRCALC guideline
    lead

    Cathryn James, Senior Clinical Support Manager for NASMeD and JRCALC, AACE'
