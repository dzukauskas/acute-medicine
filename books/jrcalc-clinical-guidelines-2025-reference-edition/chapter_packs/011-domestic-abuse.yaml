- block_id: narrative-02-introduction
  block_type: narrative
  heading: Introduction
  source_anchor: Introduction
  source_excerpt: '1. Introduction

    - Domestic violence and abuse is any incident or pattern of incidents of controlling, coercive or
    threatening behaviour, violence or abuse between those aged 16 or over who are or have been, intimate
    partners or family members regardless of gender or sexuality. The abuse can encompass, but is not
    limited to, psychological, physical, sexual, financial and emotional harm.

    - Controlling behaviour is a range of acts designed to make a person subordinate and/or dependent
    by isolating them from sources of support, exploiting their resources and capacities for personal
    gain, depriving them of the means needed for independence, resistance and escape and regulating their
    everyday behaviour.

    - Coercive behaviour is an act or pattern of acts of assault, threats, humiliation and intimidation
    or other abuse that is used to harm, punish or frighten the victim.

    - Domestic abuse is the most prevalent form of violence against women and girls.

    - Pre-hospital healthcare practitioners are in a key position to identify domestic abuse and to initiate
    support and safety for victims.

    - Domestic abuse is extremely distressing; managing such cases demands sensitive, non-judgemental
    medical and emotional care and an awareness of the forensic requirements.

    - In December 2015, a new criminal offence of domestic abuse, ‘coercive and controlling behaviour’,
    came into force, making all domestic abuse a reportable crime. In April 2021, the Domestic Abuse Act
    2021 came into force recognising children as victims and economic abuse as a form of domestic abuse,
    and introducing new measures to support victims.'
