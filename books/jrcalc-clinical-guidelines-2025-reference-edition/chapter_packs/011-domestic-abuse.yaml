- block_id: narrative-04-severity-and-outcome
  block_type: narrative
  heading: Severity and Outcome
  source_anchor: Severity and Outcome
  source_excerpt: '3. Severity and Outcome

    - The severity of the abuse can vary from verbal abuse to sustaining life-threatening injuries or
    death. The outcome of the abuse can lead to long-term psychological and physical effects.

    - Exposure to domestic abuse during childhood can have a profound effect on children’s development
    and wellbeing.

    4. Pathophysiology

    - Domestic abuse is an incident or pattern of incidents of controlling, coercive or threatening behaviour,
    violence or abuse to those aged 16 or over. These types of abuse include: psychological, physical,
    sexual, financial and emotional harm..

    - Domestic abuse also includes ‘honour’-based violence, forced marriage and female genital mutilation
    (FGM); for FGM, also refer to Safeguarding Adults at Risk and Safeguarding Children .

    5. Consent

    - Clinicians should seek the consent of the adult to share information, unless doing so would increase
    the risk of harm. Whilst a capacitated adult is free to make an unwise or bad decision, the local
    authority and/or the police can take steps to protect them if they are at risk of abuse if they are
    being unduly influenced, coerced or intimidated.'
