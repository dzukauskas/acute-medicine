- block_id: narrative-06-consent
  block_type: narrative
  heading: Consent
  source_anchor: Consent
  source_excerpt: '- Patients are likely to be very distressed about the events surrounding domestic abuse.
    They may not want to involve anybody else, and may not consent to disclosure of information to other
    parties such as the police. Do not judge or give the appearance of judging the patient. Be kind and
    considerate, and allow the patient space and as much choice as possible about options for their treatment.

    - There can be a complex but significant relationship between alcohol and drug use and domestic abuse
    perpetration.

    - Further care – it is important to encourage all victims of domestic abuse to seek medical helpand
    inform the police. Both will be able to provide physical, medical and emotional support.

    - In cases of domestic abuse in adults with needs for care and support, refer to Safeguarding Adults
    at Risk .

    - In cases of domestic abuse where children are present, involved or potentially affected by the emotional
    impact of domestic abuse, refer to Safeguarding Children .

    2. Incidence

    - In 2020, 5.5% of adults aged 16 to 74 years experienced domestic abuse in the 12 months prior. 18%
    of all offences recorded by the police in the year ending March 2021 were domestic abuse-related crimes.
    There were 362 domestic homicides recorded in the three-year period between year ending March 2018
    and year ending March 2020.

    - Women are significantly more likely than men to be victims and survivors of domestic abuse.'
