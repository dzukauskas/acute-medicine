- candidate_id: 011-domestic-abuse-term-forensic-examination
  candidate_kind: term
  source_term: forensic examination
  source_expansion: ''
  chapter_slug: 011-domestic-abuse
  source_context: '| Criminal Offence/Forensic Examination Many forms of domestic violence are criminal
    offences and staff must report all serious crimes to the police, particularly if: The patient has
    suffered from abuse involving a weapon/strangulation/smothering or has sustained a significant injury
    The patient is in fear of the perpetrator The abuse is escalating The perpetrator is stalking the
    patient and/or There is an immediate risk to the patient or any children in the household. Always
    attempt to gain consent from the victim to report to the police, but consent is not required if there
    is a public interest of other legal justification. Forensic examination may be required if a physical
