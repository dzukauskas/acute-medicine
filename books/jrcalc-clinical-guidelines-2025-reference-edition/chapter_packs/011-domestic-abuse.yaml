- block_id: narrative-03-incidence
  block_type: narrative
  heading: Incidence
  source_anchor: Incidence
  source_excerpt: '2. Incidence

    - In 2020, 5.5% of adults aged 16 to 74 years experienced domestic abuse in the 12 months prior. 18%
    of all offences recorded by the police in the year ending March 2021 were domestic abuse-related crimes.
    There were 362 domestic homicides recorded in the three-year period between year ending March 2018
    and year ending March 2020.

    - Women are significantly more likely than men to be victims and survivors of domestic abuse.

    3. Severity and Outcome

    - The severity of the abuse can vary from verbal abuse to sustaining life-threatening injuries or
    death. The outcome of the abuse can lead to long-term psychological and physical effects.

    - Exposure to domestic abuse during childhood can have a profound effect on children’s development
    and wellbeing.

    4. Pathophysiology

    - Domestic abuse is an incident or pattern of incidents of controlling, coercive or threatening behaviour,
    violence or abuse to those aged 16 or over. These types of abuse include: psychological, physical,
    sexual, financial and emotional harm..'
