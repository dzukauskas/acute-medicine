- block_id: narrative-08-key-points
  block_type: narrative
  heading: KEY POINTS!
  source_anchor: KEY POINTS!
  source_excerpt: 'KEY POINTS!

    Domestic Abuse

    - If staff suspect a crime has been committed resulting in harm to the patient, the police must be
    called.

    - Always attempt to obtain consent from the patient before making a referral for them but recognise
    when consent is not required.

    - Listen closely to the patient for disclosure, and document this on the patient record.

    - If possible, take the patient away from the scene.

    - Treatment should avoid disturbing evidence where possible.

    - Take into account any information that is disclosed by children.'
