- block_id: narrative-07-assessment-and-management
  block_type: narrative
  heading: Assessment and Management
  source_anchor: Assessment and Management
  source_excerpt: '6. Assessment and Management

    For the assessment and management of domestic abuse, refer to Table 1.1 .

    | Col 1 |

    | --- |

    | Table 1.1 – ASSESSMENT and MANAGEMENT of: Domestic Abuse |

    | Assess <C>ABCDE If any TIME-CRITICAL features present major ABCDE problems: Start correcting <C>ABCDE
    problems. Undertake a TIME-CRITICAL transfer to nearest receiving hospital. Continue patient management
    en route. Provide an ATMIST information call. |

    | Assess Limit questions to those identifying the need for medical treatment, but allow the patient
    to talk and document what is said. NB It is not appropriate to probe for details of the abuse and
    it could affect the outcome of criminal investigations. Manage according to condition: Acute injury
    – refer to Trauma Emergencies in Adults and Trauma Emergencies in Children . Acute illness – refer
    to Medical Emergencies in Adults and Medical Emergencies in Children . Indicators in the patient:
    Seems afraid or anxious to please their partner. Agrees with everything their partner says. Checks
    everything first with their partner. Talks about their partner’s temper or jealousy. Has frequent
    injuries, often described as ‘accidents’. Dresses in clothing designed to hide bruises or scars. Is
    restricted from seeing family and friends. Has limited access to money, credit cards etc. Has low
    self-esteem. Is depressed, anxious or has suicidal thoughts/action. |

    | Approach Know and recognise risk factors, signs and presenting patterns of behaviour associated
    with domestic abuse. Facilitate privacy and do not do anything which could place the victim at further
    risk, such as making enquiries in earshot of the perpetrator. Use a sensitive and respectful manner
    but ask direct questions about relationships, risks and safety factors. Focus on your care but be
    mindful of your surroundings and the information that is being passed to you, both verbal and non-verbal.
    Consider cultural/religious issues. Where possible, accommodate the patient’s requests. Remember that
    this may be the first time the victim has felt able to disclose risk to a professional, or even the
    only time they have ever had the opportunity. Where possible, avoid disturbing the scene. Where possible,
    and safe to do so, gain consent from the victim for referral to the police or a specialist domestic
    abuse service approved by your organisation’s safeguarding lead. Multiagency input and assessment
    is essential in reducing the risk of domestic abuse. Follow your local protocols when referring to
    external agencies. If your local protocol recommends that you complete a DASH risk assessment, then
    always complete this face to face with the victim rather than retrospectively after the episode of
    contact has concluded. Obtain a safe contact number for the victim for other agencies to use to contact
    them without risk of alerting the perpetrator. |'
