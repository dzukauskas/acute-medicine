- block_id: narrative-05-pathophysiology
  block_type: narrative
  heading: Pathophysiology
  source_anchor: Pathophysiology
  source_excerpt: '4. Pathophysiology

    - Domestic abuse is an incident or pattern of incidents of controlling, coercive or threatening behaviour,
    violence or abuse to those aged 16 or over. These types of abuse include: psychological, physical,
    sexual, financial and emotional harm..

    - Domestic abuse also includes ‘honour’-based violence, forced marriage and female genital mutilation
    (FGM); for FGM, also refer to Safeguarding Adults at Risk and Safeguarding Children .

    5. Consent

    - Clinicians should seek the consent of the adult to share information, unless doing so would increase
    the risk of harm. Whilst a capacitated adult is free to make an unwise or bad decision, the local
    authority and/or the police can take steps to protect them if they are at risk of abuse if they are
    being unduly influenced, coerced or intimidated.

    - Information can be shared with other professionals, without the adult’s consent, if the following
    apply: There is an immediate risk of harm. Other people are being put at risk (for example, letting
    friends who are abusive or exploitative into a shared living environment, where they may put other
    residents at risk). A child is involved. The alleged person causing harm has care and support needs
    and may also be at risk. A crime has been committed. Staff are implicated.

    - There will be times when an adult who has mental capacity decides to accept a situation considered
    as harmful or neglectful. Where this is the situation and they do not want any action to be taken,
    this does not preclude the sharing of information with relevant professional colleagues. This is to
    enable professionals to assess the risk of harm and be confident that the adult is not being unduly
    influenced, coerced or intimidated and is aware of all the options.

    - Poor handling of the consent process may result in a breakdown of trust between patients and clinicians,
    may result in opportunities to safeguard patients being missed and may also result in complaints from
    patients through the NHS complaints procedure or to professional bodies.'
