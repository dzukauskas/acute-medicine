- block_id: narrative-08-factor-v-leiden
  block_type: narrative
  heading: Factor V Leiden
  source_anchor: Factor V Leiden
  source_excerpt: '7. Factor V Leiden

    Overview

    Factor V Leiden is a genetic disorder characterised by a mutation in the Factor V gene. This mutation
    leads to an increased tendency for blood to clot, a condition known as thrombophilia. People with
    Factor V Leiden are at a higher risk of developing abnormal blood clots, which can include deep vein
    thrombosis (DVT) and pulmonary embolism (PE).

    The risk of thrombosis can be influenced by other factors such as surgery, pregnancy, and the use
    of oral contraceptives.

    Assessment & Management

    In patients with known Factor V Leiden be aware of their increased risk of venous thrombosis when
    undertaking patient assessment and formulating differential diagnosis.

    Assess particularly for:

    - Deep vein thrombosis Swelling in one leg (rarely both legs). Pain or tenderness in one leg (rarely
    both legs); often felt only when standing or walking. Increased warmth in the leg that is swollen
    or painful. Red or discoloured skin around the painful area. Swollen veins that are hard or sore when
    touched. IMPORTANT: DVTs may also occur in the patient’s upper leg, pelvis / abdomen and arms. Consider
    Wells criteria for DVT.'
