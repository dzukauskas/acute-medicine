- block_id: narrative-04-cauda-equina-syndrome
  block_type: narrative
  heading: Cauda Equina Syndrome
  source_anchor: Cauda Equina Syndrome
  source_excerpt: '3. Cauda Equina Syndrome

    For Cauda Equina Syndrome (CNS), also refer to Spinal Injury and Spinal Cord Injury and Low Back Pain
    (Non-traumatic) .

    Overview

    Cauda Equina Syndrome (CES) is a serious neurological condition where the nerve roots at the bottom
    of the spinal cord become compressed. CES is considered an acute surgical emergency, as delayed treatment
    can lead to permanent nerve damage, resulting in long-term consequences like incontinence and paralysis.
    The condition is typically treated with surgery to relieve the pressure on the nerves. Causes of CES
    include herniated discs, spinal stenosis, tumours, infections, or spinal injuries. Early diagnosis
    and treatment are crucial for the best outcomes.

    Presentation / Signs & Symptoms / Disease Characteristics

    Cauda Equina Syndrome (CES) presents with a range of signs and symptoms, which may develop rapidly
    or gradually.

    Key symptoms include:

    - Severe lower back pain Often the first symptom, this pain can be intense and persistent.'
