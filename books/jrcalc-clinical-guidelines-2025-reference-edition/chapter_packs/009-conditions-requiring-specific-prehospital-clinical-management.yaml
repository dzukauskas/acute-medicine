- block_id: narrative-16-myasthenia-gravis
  block_type: narrative
  heading: Myasthenia Gravis
  source_anchor: Myasthenia Gravis
  source_excerpt: '15. Myasthenia Gravis

    Overview

    Myasthenia Gravis (MG) is a rare autoimmune disorder resulting from binding of autoantibodies to components
    of the neuromuscular junction, most commonly the acetylcholine receptor. This leads to muscular weakness
    with excessive fatigue, which is worse on exercise and improves with rest.

    Acute illness, medications, pregnancy, and hypokalaemia can all exacerbate weakness and may swiftly
    precipitate a myasthenic crisis and respiratory inadequacy.

    In severe cases, this can result in life-threatening respiratory failure.

    Presentation / Signs & Symptoms / Disease Characteristics

    Some of the common signs and symptoms of MG may include:

    - Muscle weakness, which may be worse with exercise or later in the day'
