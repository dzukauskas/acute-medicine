- block_id: narrative-14-multiple-sclerosis
  block_type: narrative
  heading: Multiple Sclerosis
  source_anchor: Multiple Sclerosis
  source_excerpt: '13. Multiple Sclerosis

    Overview

    Multiple Sclerosis (MS) is an idiopathic, inflammatory demyelinating disorder of the brain and spinal
    cord. It is a chronic and potentially highly disabling disorder.

    The symptoms of MS vary widely from person to person and can affect any part of the body. MS is characterised
    by episodes of multiple neurological dysfunction, e.g. vision and sensory disturbances, limb weakness,
    gait problems and bladder and bowel symptoms followed by incomplete recovery.

    Patients with an established diagnosis of MS may present with acute complications for which treatment
    needs to be instituted promptly in order to minimise complications.

    The treatments for acute episodes of MS are those that modify the inflammatory process and immune
    system are used in an attempt to minimise this demyelination and this often includes administration
    of high-dose cortico-steroids.

    Assessment & Management / Key Points

    Two-thirds of MS patients die of complications of the disease, particularly pulmonary complications.'
