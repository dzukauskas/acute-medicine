- block_id: narrative-10-haemophilia
  block_type: narrative
  heading: Haemophilia
  source_anchor: Haemophilia
  source_excerpt: '9. Haemophilia

    Overview

    Haemophilia is a rare condition that affects the blood’s ability to clot. It’s usually inherited and
    most people who have it are male.

    There are two main types: Haemophilia A, caused by a deficiency of clotting factor VIII, and Haemophilia
    B, caused by a deficiency of clotting factor IX. Regardless of type, the overall principles of management
    are the same for all bleeding disorders.

    Trauma patients with haemophilia are at an increased risk of bleeding for an extended period of time;
    this bleeding may be concealed (internal). Bleeding may also occur spontaneously. Ongoing and unmanaged
    bleeding may result in a threat to life.

    Presentation / Signs & Symptoms / Disease Characteristics

    The patient may carry a Bleeding Disorder Alert Card (as below) or have a MedicAlert device.

    Assess carefully for signs and symptoms of internal and external bleeding in all patients with haemophilia.'
