- block_id: narrative-11-kawasaki-disease
  block_type: narrative
  heading: Kawasaki Disease
  source_anchor: Kawasaki Disease
  source_excerpt: '10. Kawasaki Disease

    Overview

    Kawasaki Disease is an acute, usually self-limiting inflammatory condition mainly affecting children,
    most commonly under the age of five. The cause of Kawasaki Disease isn’t fully understood.

    The disease is characterized by a high fever lasting at least five days, alongside other symptoms
    such as rash, swollen lymph nodes, red eyes, lips, and tongue, and swelling in the hands and feet.

    It’s critical to diagnose and treat Kawasaki Disease early to prevent complications such as coronary
    artery aneurysms. Kawasaki Disease is treated in hospital.

    Presentation / Signs & Symptoms / Disease Characteristics

    A child with Kawasaki disease has a high temperature that lasts for five days or longer, and possibly
    one or more of the following symptoms:

    - Rash'
