- block_id: narrative-15-muscular-dystrophy
  block_type: narrative
  heading: Muscular Dystrophy
  source_anchor: Muscular Dystrophy
  source_excerpt: '14. Muscular Dystrophy

    Overview

    Muscular dystrophy defines a group of genetic muscle conditions with progressive skeletal muscle weaknesses.
    This wasting is caused by degeneration of muscle cells. This eventually affects the respiratory muscles
    and even the heart muscle. These conditions vary in severity and affect about 8000 to 10000 people
    in the UK.

    As the condition progresses, these patients are at increased risk of respiratory failure as the lung
    muscles become weaker.

    Assessment & Management / Key Points

    Try to ascertain which type of MD the patient has. Some patients may carry alert cards. Treatment
    differs slightly between conditions.

    Patients with MD may present without the usual signs of respiratory distress.

    Duchenne muscular dystrophy and Becker muscular dystrophy –'
