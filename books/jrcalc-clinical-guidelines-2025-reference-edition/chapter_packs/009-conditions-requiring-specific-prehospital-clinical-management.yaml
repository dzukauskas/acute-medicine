- block_id: narrative-03-autonomic-dysreflexia
  block_type: narrative
  heading: Autonomic Dysreflexia
  source_anchor: Autonomic Dysreflexia
  source_excerpt: '2. Autonomic Dysreflexia

    Overview

    Autonomic dysreflexia (AD) is a potentially life-threatening condition experienced by those with spinal
    cord injuries. It is characterized by an uninhibited sympathetic nervous system response to stimuli
    below the level of spinal cord injury. It primarily affects individuals with spinal cord injuries
    at T6 or above, and the most common trigger for autonomic dysreflexia are bladder and bowel distention.

    Presentation/Signs & Symptoms/Disease Characteristics

    - Hypertension: Greater than 20 mmHg above baseline for both systolic and diastolic.

    - Severe bilateral pounding headache.

    - Diaphoresis or flushing above the level of the spinal cord lesion (diaphoresis can be profuse).

    - Nasal congestion.'
