- block_id: narrative-07-epiglottitis
  block_type: narrative
  heading: Epiglottitis
  source_anchor: Epiglottitis
  source_excerpt: '6. Epiglottitis

    For epiglottitis also refer to Foreign Body Airway Obstruction , Medical Emergencies in Children and
    Medical Emergencies in Adults and Dyspnoea guidance.

    Overview

    Epiglottitis is a potentially life-threatening condition characterized by inflammation and swelling
    of the epiglottis, a small cartilage lid that covers the trachea. This swelling can cause upper airway
    occlusion. It’s most commonly caused by a bacterial infection, although it can also result from other
    factors like injury.

    Epiglottitis can develop rapidly and requires immediate medical attention. Symptoms include severe
    sore throat, fever, a hoarse or muffled voice, difficulty swallowing, and, in severe cases, difficulty
    breathing. Since the widespread introduction of Haemophilus Influenza type B (Hib) vaccination, acute
    epiglottitis is now extremely rare in children.

    Can occur in all age groups and is becoming more prevalent in adults due to decreased uptake of Hib
    Vaccine. May present with 2–3 days of worsening symptoms followed by acute airway obstruction.

    Presentation / Signs & Symptoms / Disease Characteristics

    - Rapid onset Symptoms develop quickly, often over hours'
