- block_id: narrative-17-parkinson-s-disease
  block_type: narrative
  heading: Parkinson’s Disease
  source_anchor: Parkinson’s Disease
  source_excerpt: '16. Parkinson’s Disease

    Overview

    Parkinson’s is a progressive, fluctuating condition that affects all aspects of daily living including
    talking, swallowing and writing. Every person’s symptoms are different. People with Parkinson’s often
    find it hard to move freely and may be subject to ‘freezing’. People describe this as feeling like
    their feet are ‘glued’ to the ground. There may also be other issues including anxiety, depression,
    dementia, hallucinations, pain and continence problems. The severity of symptoms can fluctuate from
    day to day and people can experience rapid changes in functionality over the course of the day.

    Patients may have deep brain stimulation to relieve their symptoms – fine wires are implanted into
    the brain with a battery pack often under the skin on the chest. An ID card with model number and
    contact details should be present.

    Common complications of Parkinsons:

    - Postural hypotension and falls – check meds and BP for postural changes

    - Chest infection, especially aspiration pneumonia

    - Urinary Tract Infections'
  risk_flags: []
