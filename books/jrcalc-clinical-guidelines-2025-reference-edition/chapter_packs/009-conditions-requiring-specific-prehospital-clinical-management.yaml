- block_id: narrative-13-motor-neurone-disease
  block_type: narrative
  heading: Motor Neurone Disease
  source_anchor: Motor Neurone Disease
  source_excerpt: '12. Motor Neurone Disease

    Overview

    Motor Neurone Disease (MND), also known as Amyotrophic Lateral Sclerosis (ALS), is a neurodegenerative
    condition that affects the brain and nerves. It causes weakness that worsens over time. The disease
    primarily impacts motor neurons, which are nerve cells responsible for controlling voluntary muscle
    activities like walking, speaking, breathing, and swallowing. As MND progresses, these neurons deteriorate
    and die, leading to muscle weakness and atrophy.

    The exact cause of MND is unknown, but it’s believed to involve a combination of genetic and environmental
    factors. Symptoms vary but often start with slurred speech or weakness in the arms and legs. Unfortunately,
    there is no cure for MND, and treatment focuses on relieving symptoms and improving quality of life.
    The progression of the disease is different for each individual, but it can significantly shorten
    life expectancy.

    Assessment & Management / Key Points

    Common ambulance service presentations for people with MND:

    - Breathing difficulties

    - Choking or swallowing problems'
