- block_id: narrative-12-marfan-syndrome
  block_type: narrative
  heading: Marfan Syndrome
  source_anchor: Marfan Syndrome
  source_excerpt: '11. Marfan Syndrome

    Overview

    Marfan Syndrome is an uncommon inherited disorder of connective tissue characterised by loss of elastic
    tissue, resulting in musculoskeletal deformities, lens subluxation (dislocation), aortic dissection,
    and aortic root aneurysms.

    These patients are at high risk of acute aortic dissection/rupture, either spontaneously or through
    traumatic injury (refer to Vascular Emergencies ).

    Assessment & Management / Key Points

    Marfan Syndrome may be undiagnosed. It should be considered in patients who are tall and slim with
    long, thin arms, legs, and fingers.

    If a dissection is suspected:

    Refer to Vascular Emergencies , Aortic Dissection .'
