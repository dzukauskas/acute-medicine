- block_id: narrative-05-cerebral-palsy
  block_type: narrative
  heading: Cerebral Palsy
  source_anchor: Cerebral Palsy
  source_excerpt: '4. Cerebral Palsy

    Overview

    Cerebral palsy (CP) is a group of permanent movement disorders that appear in early childhood. It’s
    primarily characterized by poor coordination, stiff muscles, weak muscles, and tremors. There may
    also be problems with sensation, vision, hearing, swallowing, and speaking. Other symptoms include
    seizures and problems with thinking or reasoning, which can occur in about one-third of cases.

    Cerebral palsy is caused by abnormal development or damage to the parts of the brain that control
    movement, balance, and posture.

    There is no cure for cerebral palsy, but supportive treatments, medications, and surgery can help
    many individuals improve their motor skills and ability to communicate.

    Assessment & Management / Key Points

    During acute medical emergencies:

    - Airway management – be cautious as patients with CP may have abnormal airway anatomy or reflexes.
    They may also be at an increased risk of aspiration. Have a low threshold for escalation of care in
    case of airway compromise.'
