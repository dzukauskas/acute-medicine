- block_id: narrative-06-diabetes-insipidus
  block_type: narrative
  heading: Diabetes Insipidus
  source_anchor: Diabetes Insipidus
  source_excerpt: '5. Diabetes Insipidus

    Overview

    Diabetes Insipidus (DI) is a rare condition characterised by intense thirst and the production of
    large amounts of urine. It is different to the more common diagnosis of diabetes mellitus in that
    it involves antidiuretic hormone (ADH) dysfunction rather than a problem with blood sugar regulation.
    Patients with DI will usually have normal blood glucose levels.

    It’s crucial for patients with DI to maintain adequate hydration.

    Presentation / Signs & Symptoms / Disease Characteristics

    In severe cases or if left untreated, Diabetes Insipidus can lead to dehydration and an electrolyte
    imbalance, which may present with symptoms such as dry mouth, hypotension, muscle pains or cramps,
    and in extreme cases, arrhythmias, shock, or coma.

    Assessment & Management

    If any major <C>ABCD problems, refer to Medical Emergencies in Adults and Medical Emergencies in Children
    .'
