- block_id: narrative-02-introduction
  block_type: narrative
  heading: Introduction
  source_anchor: Introduction
  source_excerpt: '1. Introduction

    - This document aims to provide both guidance on conditions that are less frequently encountered in
    the out-of-hospital environment, and conditions that may require additional considerations further
    to the standard JRCALC guidance.

    - It is important to remember that patients experiencing chronic or rare diseases are often experts
    in their own condition. This knowledge should be respected and will often heavily influence your decision-making
    regarding both treatment and transportation decisions.

    - As clinicians we appropriately have a lower threshold for wanting to convey these clinically complex
    patients to hospital, however careful consideration must be given to whether this really is the best
    option for the patient both medically and holistically. The constantly evolving community healthcare
    services available may better fit the patient’s overall needs.

    - Many patients with long-term conditions will have personalised advance care plans or ReSPECT plans
    (Recommended Summary Plan for Emergency Care and Treatment) in place. These outline recommendations
    for a person’s clinical care and treatment in a future emergency in which they are unable to make
    or express choices.

    - Finally, it must be recognised that some of these conditions may be undiagnosed. Consequently, arrangements
    for formal diagnosis should be pursued, incorporating appropriate safety-netting measures as needed.

    2. Autonomic Dysreflexia

    Overview'
