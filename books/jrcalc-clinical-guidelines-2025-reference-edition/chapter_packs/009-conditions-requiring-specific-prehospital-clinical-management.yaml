- block_id: narrative-09-guillian-barre-syndrome
  block_type: narrative
  heading: Guillian-Barre Syndrome
  source_anchor: Guillian-Barre Syndrome
  source_excerpt: '8. Guillian-Barre Syndrome

    Overview

    Guillain-Barre syndrome is a rare inflammatory condition that affects the nerves. It most commonly
    occurs after a recent viral infection, but not always. This causes muscle weakness, pain, and sometimes
    paralysis. The onset of Guilian-Barre Syndrome is gradual and progressive over several days. 20–30%
    of patients with this condition go on to require non-invasive or invasive ventilatory support. Most
    patients make a full recovery with treatment.

    Presentation / Signs & Symptoms / Disease Characteristics

    Signs and symptoms of Guillain-Barre:

    - Muscle weakness

    - Paraesthesia

    - Speech problems'
