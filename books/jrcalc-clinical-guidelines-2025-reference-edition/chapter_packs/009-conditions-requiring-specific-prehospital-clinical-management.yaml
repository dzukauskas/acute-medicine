- block_id: narrative-18-spinal-metastases-and-metastatic-spinal-cord-compression
  block_type: narrative
  heading: Spinal Metastases and Metastatic Spinal Cord Compression
  source_anchor: Spinal Metastases and Metastatic Spinal Cord Compression
  source_excerpt: '17. Spinal Metastases and Metastatic Spinal Cord Compression

    Overview

    Cancer that has spread to the spine is known as ‘spinal metastases’. Without treatment, spinal metastases
    can press on the spinal cord. This is called metastatic spinal cord compression (or MSCC). If it isn’t
    treated quickly, MSCC can lead to serious disability, including permanent paralysis.

    MSCC is rare, but very serious. About 3 to 5 in 100 people with cancer develop it. Any type of cancer
    can lead to spinal cord compression, but it is more common in people with breast cancer, lung cancer,
    prostate cancer, lymphoma or myeloma.

    Presentation / Signs & Symptoms / Disease Characteristics

    Think about the possibility of spinal metastases or MSCC in people with any of the factors below:

    Cancer:

    - Past or current diagnosis of cancer'
