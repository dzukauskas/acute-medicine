  source_excerpt: '# Chapter 10 Consent in Pre-hospital Care

    - Šaltinio segmentai: c3ZY.xhtml

    - EPUB: JRCALC Clinical Guidelines 2025 Reference Edition.epub

    Consent in Pre-hospital Care

    1. Consent in Pre-hospital Care

    - The laws and guidance that relate to consent to assessment, treatment, care and other interventions
    are different in the countries and/or jurisdictions that constitute the UK.

    - Therefore, these guidelines do not offer guidance on obtaining consent beyond the general advice
    in this statement; the Joint Royal Colleges Ambulance Liaison Committee (JRCALC) advises strongly
    that readers should seek specific guidance on consent from their ambulance services, Trusts or other
    relevant employers.

    - JRCALC advises that obtaining consent in ways that are lawful in the jurisdiction in which each
    reader works is fundamental to meeting patients’ legal and ethical rights in determining what happens
    to them and to their own bodies. Therefore, it is important to ensure that you always act in the patient’s
    best interest and that you have legally valid consent to conduct assessments, treatments or interventions,
    and provide care.'
