  source_excerpt: '# Chapter 2 Foreword

    - Šaltinio segmentai: c7Z.xhtml

    - EPUB: JRCALC Clinical Guidelines 2025 Reference Edition.epub

    Foreword

    Welcome to the JRCALC Clinical Guidelines 2025. It is three years since the last full print publication
    of JRCALC guidelines. During this time, we continued work to ensure guidance was reviewed, updated
    and newly developed guidance was issued so that we continue to provide the best possible care to our
    patients. We are aware that the majority of people now access guidance and information via the JRCALC
    apps, iCPG and JRCALC Plus, and this remains the preferred way of accessing current clinical guidance,
    particularly when needing guidance for direct patient care. However, we understand that people still
    want access to printed material, in particular students and for general use as a reference book.

    In this 2025 print edition, we have removed the medicines section. New guidelines are being added
    regularly and existing guidelines expanded, which, on a practical level, means the size of the book
    is constantly growing; we want to keep the book a manageable size for users, and for it to reflect
    how the book is mostly used. Furthermore, it supports our recommendation that students and clinicians
    access the most current information for medicines via the apps. For all references to medicines with
    the book, please refer to the relevant medicine on the apps.

    The apps give us the ability to publish updates to guidance in real-time and in the three years since
    the previous print edition, we have released a total of ten clinical updates, all of which are included
    in this book.

    We have engaged with a number of patients, patients’ representatives and patient organisations who
    have supported us and provided a new focus on the patient perspective when updating guidance. These
    include The Sickle Cell Society, The Addison’s Disease support group, Parkinsons UK, MND Association
    and the National Poisons Information Service (NPIS-Toxbase).'
